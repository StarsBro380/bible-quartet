<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d1a; --card: #1a1a35; --accent: #e2a03f; --accent2: #7c3aed;
            --text: #f1f5f9; --text2: #94a3b8; --green: #10b981; --red: #ef4444; --border: #2d2d4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif; background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 8px; padding-bottom: 60px;
            -webkit-tap-highlight-color: transparent; user-select: none; font-size: 13px;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header { text-align: center; padding: 4px 0 8px; }
        .header h1 { font-size: 17px; }
        .header p { font-size: 10px; }
        .btn {
            width: 100%; padding: 12px; font-size: 13px; font-weight: 600;
            border: none; border-radius: 10px; cursor: pointer; margin: 3px 0;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: #fff; }

        .toast {
            position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
            background: var(--card); border: 1px solid var(--accent);
            color: var(--text); padding: 6px 12px; border-radius: 8px;
            font-size: 10px; z-index: 60; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; max-width: 90%; text-align: center;
        }
        .toast.show { opacity: 1; }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }

        .cat-header {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; padding: 6px 8px; margin: 3px 0 0;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-size: 11px;
        }
        .cat-header .title { font-weight: bold; color: var(--accent); font-size: 10px; text-transform: uppercase; }
        .cat-header .count { font-size: 9px; padding: 1px 6px; border-radius: 4px; }
        .count-full { background: var(--green); color: #fff; }
        .count-partial { background: rgba(226,160,63,0.2); color: var(--accent); }
        .cat-header .arrow { font-size: 10px; transition: transform 0.3s; }
        .cat-header .arrow.open { transform: rotate(180deg); }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px; padding: 2px 0 0;
        }
        .cards-grid.collapsed { display: none; }

        .card-cell {
            background: var(--card); border: 1.5px solid var(--border);
            border-radius: 4px; overflow: hidden; cursor: pointer;
            transition: all 0.2s; position: relative;
            aspect-ratio: 2.4/3.4;
        }
        .card-cell.owned { border-color: var(--green); cursor: default; }
        .card-cell.missing { opacity: 0.4; filter: grayscale(0.5); }
        .card-cell.missing:active { opacity: 0.8; filter: grayscale(0.2); border-color: var(--accent2); }
        .card-cell.selected {
            border-color: var(--accent2) !important;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
            opacity: 1 !important; filter: none !important;
        }
        .card-cell.selected::after {
            content: '✓'; position: absolute; top: 2px; right: 2px;
            font-size: 9px; z-index: 5; background: var(--accent2);
            border-radius: 50%; width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center; color: #fff;
        }
        .card-cell img { width: 100%; height: 100%; object-fit: cover; }
        .card-cell .label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.85); padding: 1px 2px;
            font-size: 6.5px; text-align: center; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .hidden { display: none !important; }
        .score-item { background: var(--card); border-radius: 8px; padding: 6px 10px; margin: 4px 0; display: flex; justify-content: space-between; font-size: 11px; }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card); border-top: 1px solid var(--border);
            z-index: 40; padding: 4px 6px;
        }
        .history-row {
            display: flex; gap: 3px; overflow-x: auto; padding: 2px 0;
            white-space: nowrap; height: 24px; align-items: center;
        }
        .history-row .h-item {
            flex-shrink: 0; font-size: 8px; padding: 2px 5px;
            background: rgba(255,255,255,0.04); border-radius: 4px;
            color: var(--text2); max-width: 130px;
            overflow: hidden; text-overflow: ellipsis;
        }
        .history-row .h-item b { color: var(--accent); }
        .history-row .h-item.ok { border-left: 2px solid var(--green); padding-left: 4px; }
        .history-row .h-item.no { border-left: 2px solid var(--red); padding-left: 4px; }

        .action-row { text-align: center; padding: 3px 0; }
        .action-row .btn { width: auto; padding: 8px 16px; font-size: 12px; display: inline-block; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="container">
        <div id="main-menu">
            <div class="header"><h1>📖 Библейский квартет</h1><p style="color:var(--text2)">37 квартетов · 148 карт</p></div>
            <button class="btn btn-primary" onclick="showCardCountChoice()">🎮 Играть с ботом</button>
        </div>
        <div id="card-count-screen" class="hidden">
            <div class="header"><h2>🃏 Сколько карт раздать?</h2></div>
            <button class="btn btn-primary" onclick="startGame(7)">7 карт</button>
            <button class="btn btn-primary" onclick="startGame(10)">10 карт</button>
            <button class="btn btn-primary" onclick="startGame(15)">15 карт</button>
            <button class="btn btn-secondary" onclick="showMainMenu()">← Назад</button>
        </div>
        <div id="game-screen" class="hidden">
            <div class="header"><h2 id="game-status" style="color:var(--accent);font-size:15px;"></h2><p style="color:var(--text2);font-size:10px;" id="turn-info"></p></div>
            <div id="play-area"></div>
        </div>
        <div id="win-screen" class="hidden">
            <div class="header"><h1>🏆 Игра окончена!</h1><div id="scoreboard"></div><button class="btn btn-primary" onclick="showMainMenu()">В меню</button></div>
        </div>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-panel">
        <div class="history-row" id="history-row"></div>
        <div class="action-row" id="action-row"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor('#0d0d1a'); tg.setBackgroundColor('#0d0d1a'); }
        let gameState = null, playerName = 'Игрок', selectedCard = null, moveHistory = [];
        if (tg?.initDataUnsafe?.user) playerName = tg.initDataUnsafe.user.first_name || 'Игрок';

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + (type || '') + ' show';
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
        }

        function addHistory(icon, text, type) {
            moveHistory.unshift({ icon, text, type });
            if (moveHistory.length > 20) moveHistory.pop();
            renderHistory();
        }

        function renderHistory() {
            document.getElementById('history-row').innerHTML = moveHistory.slice(0, 8).map(h => 
                `<div class="h-item ${h.type}">${h.icon} ${h.text}</div>`
            ).join('');
        }

        function renderAction() {
            const row = document.getElementById('action-row');
            if (gameState && gameState.currentPlayer === 0) {
                if (selectedCard) {
                    row.innerHTML = `<button class="btn btn-primary" onclick="requestSelected()">❓ Запросить "${selectedCard.cardName}"</button> <button class="btn btn-danger" onclick="endTurn()">✅ Закончить</button>`;
                } else {
                    row.innerHTML = `<button class="btn btn-danger" onclick="endTurn()">✅ Закончить ход</button>`;
                }
            } else {
                row.innerHTML = '';
            }
        }

        async function loadData() { const r = await fetch('data.json'); return await r.json(); }
        function showMainMenu() { document.querySelectorAll('#main-menu, #card-count-screen, #game-screen, #win-screen').forEach(e => e.classList.add('hidden')); document.getElementById('main-menu').classList.remove('hidden'); }
        function showCardCountChoice() { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('card-count-screen').classList.remove('hidden'); }

        async function startGame(n) {
            const data = await loadData();
            if (!data.length) return alert('Ошибка');
            let deck = [];
            data.forEach(q => q.cards.forEach(c => deck.push({ category: q.name, categoryId: q.id, cardName: c.name, image: c.image })));
            deck = shuffle(deck);
            gameState = { players: [{ id: 0, name: playerName, hand: deck.splice(0, n), quartets: [] }, { id: 1, name: 'Бот', hand: deck.splice(0, n), quartets: [] }], bank: deck, currentPlayer: 0, data: data };
            moveHistory = []; renderHistory();
            document.getElementById('card-count-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showToast('🎮 Игра началась! Выберите тусклую карту.', '');
            addHistory('🎮', 'Игра началась!', 'ok');
            updateUI();
        }

        function updateUI() {
            const me = gameState.players[0];
            document.getElementById('game-status').textContent = gameState.currentPlayer === 0 ? '🎯 Ваш ход' : '⏳ Бот думает...';
            document.getElementById('turn-info').textContent = `🏆 Вы: ${me.quartets.length} | Бот: ${gameState.players[1].quartets.length}`;
            if (gameState.currentPlayer === 1) { setTimeout(botTurn, 1000); }
            renderPlayArea(); renderAction(); renderHistory(); checkWin();
        }

        function renderPlayArea() {
            const me = gameState.players[0], container = document.getElementById('play-area');
            const grouped = {};
            me.hand.forEach(c => { if (!grouped[c.category]) grouped[c.category] = []; grouped[c.category].push(c); });
            const allGrouped = {};
            gameState.data.forEach(q => { allGrouped[q.name] = q.cards.map(c => ({ ...c, category: q.name, owned: me.hand.some(h => h.category === q.name && h.cardName === c.name) })); });
            const active = Object.keys(grouped).sort();
            if (!active.length) { container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text2)">У вас нет карт</p>'; return; }

            container.innerHTML = active.map(cat => {
                const cards = allGrouped[cat] || [], cnt = grouped[cat].length, done = cnt === 4;
                const catId = cat.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_');
                return `<div class="cat-header" onclick="toggleCategory('${catId}')"><span class="title">${cat}</span><span class="count ${done ? 'count-full' : 'count-partial'}">${cnt}/4${done ? ' ✅' : ''}</span><span class="arrow" id="arrow-${catId}">▼</span></div><div class="cards-grid" id="grid-${catId}">${cards.map(c => { const isOwned = c.owned; const isSel = selectedCard && selectedCard.category === cat && selectedCard.cardName === c.name; if (isOwned) return `<div class="card-cell owned"><img src="${c.image}" alt=""><div class="label">${c.name}</div></div>`; return `<div class="card-cell missing ${isSel ? 'selected' : ''}" onclick="selectCard('${cat.replace(/'/g, "\\'")}', '${c.name.replace(/'/g, "\\'")}')"><img src="${c.image}" alt=""><div class="label">${c.name}</div></div>`; }).join('')}</div>`;
            }).join('');
        }

        function toggleCategory(catId) {
            document.getElementById('grid-' + catId).classList.toggle('collapsed');
            document.getElementById('arrow-' + catId).classList.toggle('open');
        }

        function selectCard(cat, name) {
            if (gameState.currentPlayer !== 0) return;
            if (selectedCard && selectedCard.category === cat && selectedCard.cardName === name) { selectedCard = null; }
            else { selectedCard = { category: cat, cardName: name }; }
            renderPlayArea(); renderAction();
        }

        function requestSelected() {
            if (!selectedCard) { showToast('⚠️ Сначала выберите карту!', 'error'); return; }
            const me = gameState.players[0], bot = gameState.players[1];
            const idx = bot.hand.findIndex(c => c.category === selectedCard.category && c.cardName === selectedCard.cardName);
            if (idx !== -1) {
                me.hand.push(bot.hand.splice(idx, 1)[0]);
                showToast(`✅ Забрали "${selectedCard.cardName}"!`, 'success');
                addHistory('🎯', `Вы: <b>${selectedCard.cardName}</b>`, 'ok');
                checkQuartets();
            } else {
                if (gameState.bank.length) {
                    me.hand.push(gameState.bank.pop());
                    showToast(`❌ Нет "${selectedCard.cardName}". Банк.`, 'error');
                    addHistory('📦', `Нет <b>${selectedCard.cardName}</b>`, 'no');
                } else {
                    showToast(`❌ Нет "${selectedCard.cardName}". Банк пуст.`, 'error');
                    addHistory('🚫', `Нет <b>${selectedCard.cardName}</b>`, 'no');
                }
                gameState.currentPlayer = 1;
            }
            selectedCard = null; updateUI();
        }

        function endTurn() { selectedCard = null; gameState.currentPlayer = 1; updateUI(); }

        function botTurn() {
            if (gameState.currentPlayer !== 1) return;
            const bot = gameState.players[1];
            if (!bot.hand.length) { gameState.currentPlayer = 0; updateUI(); return; }
            const card = bot.hand[Math.floor(Math.random() * bot.hand.length)];
            const idx = gameState.players[0].hand.findIndex(c => c.category === card.category && c.cardName === card.cardName);
            if (idx !== -1) {
                bot.hand.push(gameState.players[0].hand.splice(idx, 1)[0]);
                showToast(`😈 Бот забрал "${card.cardName}"!`, 'error');
                addHistory('👾', `Бот: <b>${card.cardName}</b>`, 'no');
                checkQuartets();
            } else {
                if (gameState.bank.length) { bot.hand.push(gameState.bank.pop()); addHistory('📦', `Бот искал <b>${card.cardName}</b>`, 'ok'); }
                else { addHistory('🚫', `Бот искал <b>${card.cardName}</b>`, 'ok'); }
            }
            gameState.currentPlayer = 0; updateUI();
        }

        function checkQuartets() {
            [0, 1].forEach(pid => {
                const p = gameState.players[pid], g = {};
                p.hand.forEach(c => { if (!g[c.category]) g[c.category] = []; g[c.category].push(c); });
                Object.entries(g).forEach(([cat, cards]) => {
                    if (cards.length === 4) {
                        p.quartets.push(cat);
                        p.hand = p.hand.filter(c => c.category !== cat);
                        showToast(`🏆 ${p.name} собрал "${cat}"!`, 'success');
                        addHistory('🏆', `<b>${p.name}</b>: «${cat}»`, 'ok');
                    }
                });
            });
        }

        function checkWin() {
            const t = gameState.data.length, p1 = gameState.players[0].quartets.length, p2 = gameState.players[1].quartets.length;
            if (p1 + p2 >= t || (!gameState.bank.length && !gameState.players[0].hand.length && !gameState.players[1].hand.length)) endGame();
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            document.getElementById('scoreboard').innerHTML = gameState.players.sort((a, b) => b.quartets.length - a.quartets.length).map(p => `<div class="score-item"><span>${p.quartets.length >= Math.max(...gameState.players.map(x => x.quartets.length)) ? '👑 ' : ''}${p.name}</span><span style="color:var(--accent)">${p.quartets.length} квартетов</span></div>`).join('');
        }

        function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

        showMainMenu();
    </script>
</body>
</html>
