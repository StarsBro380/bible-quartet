<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d1a; --card: #1a1a35; --accent: #e2a03f; --accent2: #7c3aed;
            --text: #f1f5f9; --text2: #94a3b8; --green: #10b981; --red: #ef4444; --border: #2d2d4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif; background: var(--bg);
            color: var(--text); min-height: 100vh; padding: 16px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 24px; color: var(--accent); }
        .btn {
            width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer; margin: 8px 0;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ГРУППЫ КАРТ (КВАРТЕТЫ) */
        .quartet-group {
            background: var(--card); border: 2px solid var(--border);
            border-radius: 20px; padding: 16px; margin-bottom: 16px;
            cursor: pointer; transition: all 0.3s; position: relative;
        }
        .quartet-group:hover { border-color: var(--accent); }
        .quartet-group.selected { border-color: var(--accent2); box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        .quartet-group.completed { border-color: var(--green); background: rgba(16, 185, 129, 0.05); }

        .quartet-group .group-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .quartet-group .group-title {
            font-weight: bold; font-size: 16px; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .quartet-group .group-count {
            font-size: 14px; color: var(--text2);
        }
        .quartet-group .group-badge {
            background: var(--green); color: #fff; font-size: 11px;
            padding: 4px 10px; border-radius: 12px; font-weight: bold;
        }

        /* ВЕЕР КАРТ */
        .card-fan {
            display: flex; justify-content: center; align-items: center;
            position: relative; height: 200px;
        }
        .card-fan .fan-card {
            position: absolute;
            width: 140px; height: 190px;
            border-radius: 12px; overflow: hidden;
            border: 2px solid var(--border);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            background: var(--card);
        }
        .card-fan .fan-card img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .card-fan .fan-card.missing {
            opacity: 0.3; filter: grayscale(0.8);
        }
        .card-fan .fan-card.missing::after {
            content: '?';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px; color: var(--text2); font-weight: bold;
        }

        /* Подсказка по картам */
        .card-list-hint {
            display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
        }
        .card-list-hint span {
            font-size: 11px; padding: 3px 8px; border-radius: 8px;
        }
        .card-list-hint .owned-hint {
            background: rgba(16, 185, 129, 0.2); color: var(--green); font-weight: bold;
        }
        .card-list-hint .missing-hint {
            background: rgba(148, 163, 184, 0.1); color: var(--text2);
        }

        .game-log {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; margin: 16px 0;
            max-height: 120px; overflow-y: auto; font-size: 12px; color: var(--text2);
        }
        .game-log p { margin: 4px 0; }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex;
            align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: var(--card); border-radius: 16px; padding: 24px;
            max-width: 400px; width: 90%; text-align: center;
        }
        .modal-content h2 { margin-bottom: 16px; color: var(--accent); }
        .player-choose {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; margin: 8px 0;
            cursor: pointer; transition: all 0.2s;
        }
        .player-choose:hover { border-color: var(--accent); }
        .hidden { display: none !important; }
        .scoreboard { text-align: center; margin: 16px 0; }
        .score-item {
            background: var(--card); border-radius: 12px; padding: 12px;
            margin: 8px 0; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="main-menu">
            <div class="header">
                <h1>📖 Библейский квартет</h1>
                <p style="color:var(--text2)">37 квартетов · 148 карт</p>
            </div>
            <button class="btn btn-primary" onclick="createGame()">🎮 Играть с ботом</button>
        </div>

        <!-- ИГРА -->
        <div id="game-screen" class="hidden">
            <div class="header">
                <h2 id="game-status" style="color:var(--accent)"></h2>
                <p style="color:var(--text2)" id="turn-info"></p>
            </div>
            <div class="game-log" id="game-log"></div>
            <div id="quartet-groups"></div>
            <button class="btn btn-primary hidden" id="request-btn" onclick="showRequestModal()">❓ Запросить карту</button>
            <button class="btn btn-danger hidden" id="end-btn" onclick="endTurn()">✅ Закончить ход</button>
        </div>

        <!-- МОДАЛКА -->
        <div id="request-modal" class="modal hidden">
            <div class="modal-content">
                <h2>❓ У кого запросить?</h2>
                <div id="player-choose-list"></div>
                <button class="btn btn-secondary" onclick="closeRequestModal()">Отмена</button>
            </div>
        </div>

        <!-- ПОБЕДА -->
        <div id="win-screen" class="hidden">
            <div class="header">
                <h1>🏆 Игра окончена!</h1>
                <div class="scoreboard" id="scoreboard"></div>
                <button class="btn btn-primary" onclick="backToMenu()">В меню</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        let gameState = null;
        let playerName = 'Игрок';
        let selectedGroup = null;

        if (tg?.initDataUnsafe?.user) {
            playerName = tg.initDataUnsafe.user.first_name || 'Игрок';
        }

        async function loadGameData() {
            const resp = await fetch('data.json');
            return await resp.json();
        }

        function showMainMenu() {
            document.querySelectorAll('#main-menu, #game-screen, #win-screen').forEach(el => el.classList.add('hidden'));
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function backToMenu() { gameState = null; showMainMenu(); }

        async function createGame() {
            const data = await loadGameData();
            if (!data.length) return alert('Ошибка загрузки');

            let deck = [];
            data.forEach(q => {
                q.cards.forEach(c => {
                    deck.push({ category: q.name, categoryId: q.id, cardName: c.name, image: c.image });
                });
            });

            deck = shuffle(deck);

            const handSize = Math.min(8, Math.floor(deck.length / 2));
            const playerHand = deck.splice(0, handSize);
            const botHand = deck.splice(0, handSize);

            gameState = {
                players: [
                    { id: 0, name: playerName, hand: playerHand, quartets: [] },
                    { id: 1, name: 'Бот', hand: botHand, quartets: [] }
                ],
                bank: deck, currentPlayer: 0, log: [], data: data
            };
            showGame();
        }

        function showGame() {
            document.querySelectorAll('#main-menu, #game-screen, #win-screen').forEach(el => el.classList.add('hidden'));
            document.getElementById('game-screen').classList.remove('hidden');
            updateGameUI();
        }

        function updateGameUI() {
            const me = gameState.players[0];
            const current = gameState.players[gameState.currentPlayer];
            document.getElementById('game-status').textContent = gameState.currentPlayer === 0 ? '🎯 Ваш ход' : '⏳ Бот думает...';
            document.getElementById('turn-info').textContent = `Ходит: ${current.name} | Банк: ${gameState.bank.length} карт | 🏆 Вы: ${me.quartets.length} | Бот: ${gameState.players[1].quartets.length}`;

            if (gameState.currentPlayer === 0) {
                document.getElementById('request-btn').classList.remove('hidden');
                document.getElementById('end-btn').classList.remove('hidden');
            } else {
                document.getElementById('request-btn').classList.add('hidden');
                document.getElementById('end-btn').classList.add('hidden');
                setTimeout(botTurn, 1200);
            }

            renderQuartetGroups();
            checkWin();
        }

        function renderQuartetGroups() {
            const me = gameState.players[0];
            const container = document.getElementById('quartet-groups');

            // Группируем карты игрока по категориям
            const playerGrouped = {};
            me.hand.forEach(card => {
                if (!playerGrouped[card.category]) playerGrouped[card.category] = [];
                playerGrouped[card.category].push(card);
            });

            // Получаем все категории из data
            const allCategories = gameState.data;

            container.innerHTML = allCategories.map(q => {
                const owned = playerGrouped[q.name] || [];
                const ownedCount = owned.length;
                const isComplete = ownedCount === 4;
                const isSelected = selectedGroup === q.name;

                // Генерируем веер карт
                let fanHTML = '';
                const allCards = q.cards;

                allCards.forEach((c, index) => {
                    const isOwned = owned.some(o => o.cardName === c.name);
                    const angle = (index - 1.5) * 6; // разброс веером
                    const offsetX = (index - 1.5) * 20;
                    
                    if (isOwned) {
                        fanHTML += `<div class="fan-card" style="transform: rotate(${angle}deg) translateX(${offsetX}px); z-index:${index+1};">
                            <img src="${c.image}" alt="${c.name}" onerror="this.style.display='none'">
                        </div>`;
                    } else {
                        fanHTML += `<div class="fan-card missing" style="transform: rotate(${angle}deg) translateX(${offsetX}px); z-index:${index+1}; opacity:0.3;">
                            <img src="${c.image}" alt="${c.name}" onerror="this.parentElement.innerHTML='<div style=width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--text2)>?</div>'">
                        </div>`;
                    }
                });

                // Подсказки
                let hintsHTML = allCards.map(c => {
                    const isOwned = owned.some(o => o.cardName === c.name);
                    return `<span class="${isOwned ? 'owned-hint' : 'missing-hint'}">${isOwned ? '✅' : '○'} ${c.name}</span>`;
                }).join('');

                return `
                    <div class="quartet-group ${isComplete ? 'completed' : ''} ${isSelected ? 'selected' : ''}" 
                         onclick="selectQuartetGroup('${q.name.replace(/'/g, "\\'")}')">
                        <div class="group-header">
                            <span class="group-title">${q.name}</span>
                            <span class="group-count">${ownedCount}/4 ${isComplete ? '<span class="group-badge">СОБРАН!</span>' : ''}</span>
                        </div>
                        <div class="card-fan">${fanHTML}</div>
                        <div class="card-list-hint">${hintsHTML}</div>
                    </div>
                `;
            }).join('');
        }

        function selectQuartetGroup(category) {
            if (gameState.currentPlayer !== 0) return;
            
            // Переключаем выделение
            if (selectedGroup === category) {
                selectedGroup = null;
            } else {
                selectedGroup = category;
            }
            renderQuartetGroups();
        }

        function showRequestModal() {
            if (!selectedGroup) {
                alert('Сначала выберите категорию (нажмите на группу карт)!');
                return;
            }

            const me = gameState.players[0];
            const owned = me.hand.filter(c => c.category === selectedGroup);
            
            if (owned.length === 0) {
                alert('У вас нет карт этой категории!');
                return;
            }

            // Показываем, у кого запросить
            const list = document.getElementById('player-choose-list');
            list.innerHTML = gameState.players.filter(p => p.id !== 0).map(p => `
                <div class="player-choose" onclick="requestFromPlayer(${p.id}, '${selectedGroup.replace(/'/g, "\\'")}')">
                    ${p.name} (${p.hand.length} карт)
                </div>
            `).join('');
            document.getElementById('request-modal').classList.remove('hidden');
        }

        function closeRequestModal() {
            document.getElementById('request-modal').classList.add('hidden');
        }

        function requestFromPlayer(targetId, category) {
            closeRequestModal();

            const me = gameState.players[0];
            const target = gameState.players.find(p => p.id === targetId);
            
            // Выбираем карту, которой у нас нет в этой категории
            const allCards = gameState.data.find(q => q.name === category).cards;
            const ownedNames = me.hand.filter(c => c.category === category).map(c => c.cardName);
            const missingCard = allCards.find(c => !ownedNames.includes(c.name));
            
            if (!missingCard) {
                alert('У вас уже есть все карты этой категории!');
                return;
            }

            const cardName = missingCard.name;
            const cardIndex = target.hand.findIndex(c => c.category === category && c.cardName === cardName);

            if (cardIndex !== -1) {
                const card = target.hand.splice(cardIndex, 1)[0];
                me.hand.push(card);
                addLog(`✅ Вы забрали "${cardName}" у ${target.name}!`);
                checkQuartets();
                selectedGroup = null;
                updateGameUI();
            } else {
                if (gameState.bank.length > 0) {
                    const newCard = gameState.bank.pop();
                    me.hand.push(newCard);
                    addLog(`❌ У ${target.name} нет "${cardName}". Берёте из банка.`);
                } else {
                    addLog(`❌ У ${target.name} нет "${cardName}". Банк пуст.`);
                }
                selectedGroup = null;
                gameState.currentPlayer = 1;
                updateGameUI();
            }
        }

        function endTurn() {
            selectedGroup = null;
            gameState.currentPlayer = 1;
            updateGameUI();
        }

        function botTurn() {
            if (gameState.currentPlayer !== 1) return;
            const bot = gameState.players[1];
            if (bot.hand.length === 0) { gameState.currentPlayer = 0; updateGameUI(); return; }

            const randomCard = bot.hand[Math.floor(Math.random() * bot.hand.length)];
            const target = gameState.players[0];
            const cardIndex = target.hand.findIndex(c => c.category === randomCard.category && c.cardName === randomCard.cardName);

            if (cardIndex !== -1) {
                const card = target.hand.splice(cardIndex, 1)[0];
                bot.hand.push(card);
                addLog(`😈 Бот забрал "${randomCard.cardName}" (${randomCard.category})!`);
                checkQuartets();
            } else {
                if (gameState.bank.length > 0) {
                    const newCard = gameState.bank.pop();
                    bot.hand.push(newCard);
                    addLog(`🤖 Бот искал "${randomCard.cardName}". Взял из банка.`);
                } else {
                    addLog(`🤖 Бот искал "${randomCard.cardName}". Банк пуст.`);
                }
            }
            gameState.currentPlayer = 0;
            updateGameUI();
        }

        function checkQuartets() {
            [0, 1].forEach(pid => {
                const player = gameState.players[pid];
                const grouped = {};
                player.hand.forEach(card => {
                    if (!grouped[card.category]) grouped[card.category] = [];
                    grouped[card.category].push(card);
                });
                Object.entries(grouped).forEach(([cat, cards]) => {
                    if (cards.length === 4) {
                        player.quartets.push(cat);
                        player.hand = player.hand.filter(c => c.category !== cat);
                        addLog(`🏆 ${player.name} собрал квартет "${cat}"!`);
                    }
                });
            });
        }

        function checkWin() {
            const total = gameState.data.length;
            const p1 = gameState.players[0].quartets.length;
            const p2 = gameState.players[1].quartets.length;
            if (p1 + p2 >= total || (gameState.bank.length === 0 && gameState.players[0].hand.length === 0 && gameState.players[1].hand.length === 0)) {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = gameState.players.sort((a, b) => b.quartets.length - a.quartets.length).map(p => `
                <div class="score-item"><span>${p.quartets.length >= Math.max(...gameState.players.map(x => x.quartets.length)) ? '👑 ' : ''}${p.name}</span><span style="color:var(--accent)">${p.quartets.length} квартетов</span></div>
            `).join('');
        }

        function addLog(msg) {
            gameState.log.push(msg);
            const logEl = document.getElementById('game-log');
            logEl.innerHTML = gameState.log.slice(-8).map(m => `<p>${m}</p>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        showMainMenu();
    </script>
</body>
</html>
