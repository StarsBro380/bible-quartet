<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8; --card: #fffef9; --accent: #7b4b2a; --accent2: #5b3ec9;
            --text: #1a0f08; --text2: #8a7568; --green: #27ae60; --red: #c0392b;
            --border: #e0d5c5; --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --history-bg: #a09080;
            --gradient: linear-gradient(135deg, #f5f0e8 0%, #e8ddd0 100%);
            --glass: rgba(255, 255, 255, 0.6);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --shadow-xl: 0 12px 48px rgba(0,0,0,0.15);
            --gold: linear-gradient(135deg, #8B5A2B 0%, #D4A76A 50%, #8B5A2B 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background: var(--gradient);
            color: var(--text);
            min-height: 100vh; padding: 12px; padding-bottom: 160px;
            -webkit-tap-highlight-color: transparent; user-select: none;
            font-size: 14px; line-height: 1.5;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header { text-align: center; padding: 6px 0 4px; }
        .btn {
            display: inline-block; padding: 12px 20px; font-size: 15px; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer; margin: 4px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            transform: scale(1);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(123, 75, 42, 0.2);
        }
        .btn:active {
            transform: scale(0.96) !important;
            transition-duration: 0.1s !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8B5A2B 0%, #6B3A1B 100%);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #9A6A3B 0%, #7B4A2B 100%);
            box-shadow: 0 8px 24px rgba(123, 75, 42, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text);
            border: 2px solid #d5c8b5;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.95);
            border-color: #7b4b2a;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        .btn-full { width: 100%; display: block; }
        .input {
            width: 100%; padding: 10px 14px; font-size: 15px;
            border: 2px solid #d5c8b5; border-radius: 10px; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
            color: var(--accent);
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .input:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(123,75,42,0.1);
            background: rgba(255, 255, 255, 0.9);
        }
        .input-code { text-align: center; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--accent);
            color: var(--text); padding: 14px 24px; border-radius: 14px;
            font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; max-width: 90%; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            font-weight: 500;
            transform: translateX(-50%) translateY(-20px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 14px;
            margin: 8px 0; font-size: 14px; border: 2px solid #d5c8b5; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .info-bar .turn { 
            color: var(--accent); 
            font-weight: 700; 
            font-size: 15px; 
            letter-spacing: 0.5px;
        }
        .info-bar .score { 
            color: var(--text2); 
            font-size: 13px; 
            background: rgba(123,75,42,0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .cat-section { margin: 6px 0; }
        .cat-header {
            background: linear-gradient(135deg, #7b4b2a 0%, #8a5530 100%);
            color: #fff;
            border: none; border-radius: 12px 12px 0 0;
            padding: 10px 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; box-shadow: 0 2px 8px rgba(123,75,42,0.2);
        }
        .cat-header .title { 
            font-weight: 700; 
            color: #fff; 
            font-size: 13px; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }
        .cat-header .badge { 
            font-size: 12px; 
            padding: 4px 14px; 
            border-radius: 20px; 
            font-weight: 700; 
        }
        .badge-full { 
            background: rgba(255,255,255,0.2); 
            color: #fff; 
            backdrop-filter: blur(4px); 
        }
        .badge-partial { 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            backdrop-filter: blur(4px); 
        }
        .cat-header .arrow { font-size: 12px; transition: transform 0.3s; }
        .cat-header .arrow.open { transform: rotate(180deg); }
        .cards-row {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 10px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #d5c8b5; border-top: none;
            border-radius: 0 0 12px 12px;
        }
        .cards-row.collapsed { display: none; }
        .card-chip {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #d5c8b5;
            border-radius: 10px; padding: 10px 10px; cursor: pointer;
            font-size: 13px; text-align: center;
            flex: 1 1 calc(50% - 6px); min-width: 80px; max-width: calc(50% - 6px);
            position: relative; color: var(--text);
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-chip.owned { 
            border-color: #27ae60; 
            background: rgba(39, 174, 96, 0.08); 
            cursor: default; 
            border-width: 2px;
        }
        .card-chip.missing { 
            opacity: 0.7; 
            border-style: dashed; 
            background: rgba(250, 250, 250, 0.5); 
        }
        .card-chip.missing:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(91, 62, 201, 0.12);
            opacity: 1;
        }
        .card-chip.selected {
            border-color: #5b3ec9 !important; 
            background: rgba(91, 62, 201, 0.08) !important;
            box-shadow: 0 0 24px rgba(91,62,201,0.15);
            opacity: 1 !important; 
            transform: scale(1.08) !important;
            animation: pulse 0.5s ease-in-out;
        }
        .card-chip .chip-name { font-size: 12px; line-height: 1.4; font-weight: 500; }
        @keyframes pulse {
            0%, 100% { transform: scale(1.08); }
            50% { transform: scale(1.12); }
        }
        .hidden { display: none !important; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .player-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #d5c8b5; border-radius: 12px;
            padding: 10px; flex: 1 1 calc(50% - 6px); min-width: 100px;
            text-align: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .player-card:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .player-card:active { border-color: var(--accent2); background: rgba(91,62,201,0.05); }
        .player-card.current {
            border-color: var(--accent);
            background: rgba(123, 75, 42, 0.06);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 6px rgba(123, 75, 42, 0.1); }
            to { box-shadow: 0 0 20px rgba(123, 75, 42, 0.2); }
        }
        .player-card.selected-player { border: 3px solid #5b3ec9; background: rgba(91,62,201,0.08); }
        .player-card .p-name { 
            font-weight: 700; 
            font-size: 14px; 
            color: var(--accent); 
            font-family: 'Playfair Display', serif; 
        }
        .player-card .p-info { font-size: 11px; color: var(--text2); margin-top: 3px; }
        .score-item {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 12px; padding: 12px 16px;
            margin: 6px 0; display: flex; justify-content: space-between;
            font-size: 15px; border: 2px solid #d5c8b5; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .winner { 
            border-color: var(--accent); 
            background: rgba(123,75,42,0.05); 
            border-width: 2px;
        }
        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 2px solid #d5c8b5;
            z-index: 50; padding: 8px 10px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 32px rgba(0,0,0,0.06);
        }
        .history-container {
            max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .history-container.open { max-height: 250px; overflow-y: auto; }
        .history-toggle {
            font-size: 12px; color: #fff; cursor: pointer;
            text-align: center; padding: 8px 0; user-select: none;
            background: linear-gradient(135deg, #7b4b2a 0%, #8a5530 100%);
            border-radius: 10px;
            margin: 0 0 4px 0; font-weight: 600;
            border: 1px solid #5a3518;
            box-shadow: 0 2px 8px rgba(123,75,42,0.2);
        }
        .history-item {
            font-size: 11px; padding: 6px 12px; margin: 2px 0;
            border-radius: 8px; display: flex; gap: 8px; align-items: flex-start;
        }
        .history-item.ok { background: rgba(39, 174, 96, 0.08); border-left: 3px solid var(--green); }
        .history-item.no { background: rgba(192, 57, 43, 0.08); border-left: 3px solid var(--red); }
        .history-item.system { background: rgba(123, 75, 42, 0.08); border-left: 3px solid var(--accent); }
        .history-item .h-time { color: var(--text2); white-space: nowrap; font-size: 10px; }
        .history-item .h-text { flex: 1; }
        .action-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
        .action-row .btn { flex: 1; min-width: 80px; padding: 10px; font-size: 13px; }
        .code-display {
            text-align: center; padding: 12px; margin: 6px 0;
            position: relative;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .code-display:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .code-display .code { 
            font-family: 'Playfair Display', serif; 
            font-size: 32px; 
            font-weight: 700; 
            color: var(--accent); 
            letter-spacing: 8px; 
        }
        .code-display .copy-hint { color: var(--text2); font-size: 11px; margin-top: 6px; }
        .code-display .waiting { color: var(--text2); font-size: 11px; margin-top: 4px; }
        .players-waiting { margin: 6px 0; }
        .players-waiting .pw-item { 
            padding: 8px 14px; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            border-radius: 10px; 
            margin: 3px 0; 
            border: 1px solid #d5c8b5;
            font-size: 14px; 
        }
        .container > * {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .decor-line {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #7b4b2a, #8a5530);
            margin: 6px auto;
            border-radius: 3px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, #7b4b2a, #8a5530); 
            border-radius: 2px; 
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }

        .menu-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(123,75,42,0.03), transparent 70%);
            animation: menu-shine 6s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes menu-shine {
            0% { transform: translate(-10%, -10%); opacity: 0.5; }
            100% { transform: translate(10%, 10%); opacity: 1; }
        }

        .menu-container .logo-container {
            position: relative;
            z-index: 1;
        }

        .menu-container .btn {
            width: 100%;
            max-width: 300px;
            position: relative;
            z-index: 1;
        }

        .menu-decoration {
            position: absolute;
            bottom: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123,75,42,0.05), transparent 70%);
            pointer-events: none;
        }

        .menu-decoration-2 {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123,75,42,0.03), transparent 70%);
            pointer-events: none;
        }

        .btn-icon {
            display: inline-block;
            margin-right: 8px;
            animation: icon-bounce 2s ease-in-out infinite;
        }

        @keyframes icon-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        .btn-icon.join-icon {
            animation-delay: 0.3s;
        }

        /* 🔔 Уведомление сверху (постоянное) */
        #notification-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(123, 75, 42, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 10px 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 200;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            transform: translateY(-100%);
            transition: transform 0.3s ease-out;
        }
        #notification-bar.show {
            transform: translateY(0);
            display: flex;
        }
        #notification-bar .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 0 6px;
            opacity: 0.7;
        }
        #notification-bar .close-btn:hover {
            opacity: 1;
        }

        /* 📬 Кнопка уведомлений в меню */
        .notification-badge {
            position: relative;
        }
        .notification-badge .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--red);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }
        .support-btn {
            position: relative;
        }
        .support-btn .unread-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
        }

        /* Модальное окно — адаптивное */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }
        .modal-overlay .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-overlay .modal-content h3 {
            font-family: 'Inter', sans-serif;
            color: var(--accent);
            font-size: 18px;
            margin-bottom: 12px;
        }
        .modal-overlay .modal-content .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .modal-overlay .modal-content .btn-group .btn {
            flex: 1;
        }

        /* Чат поддержки */
        .chat-messages {
            max-height: 300px;
            overflow-y: auto;
            margin: 8px 0;
            padding: 8px;
            background: rgba(245, 240, 232, 0.3);
            border-radius: 8px;
        }
        .chat-message {
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .chat-message.user {
            background: rgba(123, 75, 42, 0.08);
            align-self: flex-end;
            margin-left: auto;
        }
        .chat-message.admin {
            background: rgba(39, 174, 96, 0.08);
            border-left: 3px solid var(--green);
        }
        .chat-message .msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text2);
            margin-bottom: 2px;
        }
        .chat-message .msg-header .sender {
            font-weight: 600;
            color: var(--accent);
        }
        .chat-message .msg-header .time {
            font-weight: 400;
        }
        .chat-message .msg-text {
            font-weight: 400;
        }
        .chat-input-area {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #d5c8b5;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .chat-input-area .btn {
            padding: 8px 16px;
            font-size: 13px;
            flex: 0 0 auto;
        }
    </style>
</head>
<body>
    <!-- 🔔 Уведомление сверху -->
    <div id="notification-bar">
        <span id="notification-text">📩 У вас есть ответ от поддержки</span>
        <button class="close-btn" onclick="closeNotification()">✕</button>
    </div>

    <div class="toast" id="toast"></div>
    <div class="container" id="app"></div>
    <div class="bottom-panel hidden" id="bottom-panel">
        <div class="history-toggle" id="history-toggle" onclick="toggleHistory()">📜 История ▼</div>
        <div class="history-container" id="history-container">
            <div id="history-list"></div>
        </div>
        <div class="action-row" id="action-row"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor('#f5f0e8'); tg.setBackgroundColor('#f5f0e8'); }
        
        const API = 'https://bible-quartet-server.onrender.com';
        const ADMIN_IDS = [39444699];
        let state = null, playerId = null, roomCode = null, selectedCard = null, selectedPlayerId = null;
        let playerName = tg?.initDataUnsafe?.user?.first_name || 'Игрок';
        let pollTimer = null, historyOpen = false;
        let feedbackOpen = false, rulesOpen = false, adminOpen = false;
        let isObserver = false;
        let notificationShown = false;

        function toast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
            clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
        }

        // 🔔 Постоянное уведомление

        async function createGame(n) {

                const r = await fetch(API+'/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:playerName,cards:n,playerId:parseInt(playerId)})});
                const d = await r.json();
                if(d.ok){roomCode=d.code;playerId=parseInt(d.playerId);showLobby();} else toast(d.error,'error');

        async function joinGame() {

            try {
                const r=await fetch(API+'/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,name:playerName,playerId:parseInt(playerId)})});
                const d=await r.json();
                if(d.ok){roomCode=code;playerId=parseInt(d.playerId);startPolling();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        async function startGame() {
            try {
                const r=await fetch(API+'/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,playerId})});
                const d=await r.json();
                if(d.ok){startPolling();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        function copyCode(){if(!roomCode)return;navigator.clipboard.writeText(roomCode).then(()=>toast('📋 Код скопирован!','success')).catch(()=>toast('Не удалось скопировать','error'));}
        function showLobby() {
            clearInterval(pollTimer);
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:8px;max-width:400px;margin:0 auto;">

                        </div>
                    </div>

                    </div>
                    <div class="code-display" onclick="copyCode()" style="width:100%;padding:12px;margin:4px 0;">
                        <div class="running-border"></div>
                        <div class="code" style="font-size:32px;letter-spacing:8px;font-family:'Playfair Display',serif;color:var(--accent);font-weight:700;">${roomCode}</div>
                        <p class="copy-hint" style="font-size:11px;color:var(--text2);margin-top:6px;">📋 Нажмите, чтобы скопировать</p>
                        <p class="waiting" style="font-size:11px;color:var(--text2);margin-top:4px;">Поделитесь кодом с другими игроками</p>
                    </div>
                    <div class="players-waiting" id="players-waiting" style="width:100%;margin:4px 0;">
                        <div class="player-panel">
                            <div class="player-avatar creator">👤</div>
                            <div class="player-info">
                                <span class="player-name">${playerName}</span>
                                <span class="player-role creator-role">👑 Создатель</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="startGame()" style="width:100%;max-width:300px;padding:12px;font-size:15px;border-radius:12px;">🎮 Начать игру</button>
                    <button class="btn btn-secondary btn-full" onclick="clearInterval(pollTimer);showMenu();" style="width:100%;max-width:300px;padding:12px;font-size:15px;border-radius:12px;">← Отмена</button>
                </div>
            `;
            window.autoUpdateName = async function() {
                const newName = document.getElementById('lobby-name').value.trim() || 'Игрок';
                if (newName !== playerName) {
                    try {
                        const r = await fetch(API+'/rename', {
                            method: 'POST',
                            headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({code: roomCode, playerId: playerId, name: newName})
                        });
                        const d = await r.json();
                        if(d.ok) {
                            playerName = newName;
                            toast('✅ Имя обновлено!', 'success');
                        } else {
                            toast(d.error, 'error');
                        }
                    } catch(e) {
                        toast('Ошибка при обновлении имени', 'error');
                    }
                }
            };
            pollTimer = setInterval(async () => {
                try {
                    const r = await fetch(`${API}/state/${roomCode}/${playerId}`);
                    const d = await r.json();
                    if (d.ok) {
                        const container = document.getElementById('players-waiting');
                        if (container) {
                            while (container.children.length > 1) {
                                container.removeChild(container.lastChild);
                            }
                            d.players.forEach(p => {
                                if (p.id === d.ownerId) return;
                                const div = document.createElement('div');
                                div.className = 'player-panel';
                                div.style.marginTop = '4px';
                                div.innerHTML = `
                                    <div class="player-avatar">👤</div>
                                    <div class="player-info">
                                        <span class="player-name">${p.name}</span>
                                        <span class="player-role">Игрок</span>
                                    </div>
                                `;
                                container.appendChild(div);
                            });
                        }
                        if (d.status === 'playing') {
                            fetchState();
                        }
                    }
                } catch (e) {}
            }, 1000);
        }
        function startPolling() {
            if (pollTimer) {
                clearTimeout(pollTimer);
                pollTimer = null;
            }
            fetchState();
            function poll() {
                fetchState();
                pollTimer = setTimeout(poll, 300);
            }
            pollTimer = setTimeout(poll, 300);
        }
        async function fetchState() {
            if(!roomCode||playerId===null)return;
            try {
                const r=await fetch(`${API}/state/${roomCode}/${playerId}`);
                const d=await r.json();
                if(d.ok){
                    d.currentPlayer=parseInt(d.currentPlayer);d.playerId=parseInt(d.playerId);
                    d.bankCount=parseInt(d.bankCount);d.ownerId=parseInt(d.ownerId);
                    if(d.players)d.players.forEach(p=>{p.id=parseInt(p.id);p.handCount=parseInt(p.handCount);});
                    state=d;
                    isObserver = d.is_observer || false;
                    renderGame();
                }
            } catch(e){}
        }
        function renderGame() {
            if(!state||state.status==='lobby'){showLobby();return;}
            document.getElementById('bottom-panel').classList.remove('hidden');
            
            if (isObserver) {
                document.getElementById('app').innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text2);">
                        <span style="font-size:24px;">👁</span>
                        <p style="margin-top:8px;font-size:14px;">Вы наблюдаете за игрой как администратор</p>
                        <button class="btn btn-secondary" onclick="leaveGame()" style="margin-top:12px;">🚪 Выйти из наблюдения</button>
                    </div>
                `;
                return;
            }
            
            const me=state.players.find(p=>parseInt(p.id)===parseInt(playerId));
            if(!me)return;
            const isMyTurn = parseInt(state.currentPlayer) === parseInt(playerId);
            const curObj = state.players.find(p => parseInt(p.id) === parseInt(state.currentPlayer));
            const curName = curObj ? curObj.name : 'Неизвестно';
            let html=`<div class="info-bar"><span class="turn">${isMyTurn?'🎯 Ваш ход':'⏳ Ход: '+curName}</span><span class="score">🏆 ${me.quartets.length} | Запас: ${state.bankCount}</span></div>`;
            html+='<div class="player-list">';
            for(const p of state.players){
                if(parseInt(p.id)===parseInt(playerId))continue;
                const isSelected = selectedPlayerId === parseInt(p.id);
                html+=`<div class="player-card ${parseInt(state.currentPlayer)===parseInt(p.id)?'current':''} ${isSelected?'selected-player':''}" onclick="selectPlayer(${p.id})"><div class="p-name">${p.name}</div><div class="p-info">🃏 ${p.handCount} карт | 🏆 ${p.quartets.length} квартетов</div></div>`;
            }
            html+='</div>';
            const grouped={};if(me.hand)me.hand.forEach(c=>{if(!grouped[c.category])grouped[c.category]=[];grouped[c.category].push(c);});
            const allCats={};state.categories.forEach(q=>{allCats[q.name]=q.cards.map(c=>({name:c.name,category:q.name,owned:me.hand?me.hand.some(h=>h.category===q.name&&h.cardName===c.name):false}));});
            const active=Object.keys(grouped).sort();
            if(!active.length)html+='<p style="text-align:center;padding:40px;color:var(--text2);font-size:14px;">У вас нет карт</p>';
            else {html+=active.map(cat=>{const cards=allCats[cat]||[],cnt=grouped[cat].length,done=cnt===4;const catId=cat.replace(/[^a-zA-Zа-яА-Я0-9]/g,'_');return `<div class="cat-section"><div class="cat-header" onclick="toggleCat('${catId}')"><span class="title">${cat}</span><span class="badge ${done?'badge-full':'badge-partial'}">${cnt}/4${done?' ✅':''}</span><span class="arrow" id="arrow-${catId}">▼</span></div><div class="cards-row" id="row-${catId}">${cards.map(c=>{const o=c.owned;const s=selectedCard&&selectedCard.category===cat&&selectedCard.cardName===c.name;return o?`<div class="card-chip owned"><div class="chip-name">✅ ${c.name}</div></div>`:`<div class="card-chip missing ${s?'selected':''}" onclick="selectCard('${cat.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}')"><div class="chip-name">🃏 ${c.name}</div></div>`;}).join('')}</div></div>`;}).join('');}
            document.getElementById('app').innerHTML=html;renderHistory(state.history);renderActions();checkWin();
            
            const bottom = document.getElementById('bottom-panel');
            const exitBtn = document.createElement('div');
            exitBtn.style.cssText = 'display:flex;gap:8px;padding:4px 10px;justify-content:center;';
            exitBtn.innerHTML = `
                <button class="btn btn-secondary" style="padding:6px 14px;font-size:12px;" onclick="leaveGame()">🚪 Покинуть игру</button>
                ${parseInt(state.ownerId) === parseInt(playerId) ? `
                <button class="btn btn-secondary" style="padding:6px 14px;font-size:12px;background:var(--red);color:#fff;border-color:var(--red);" onclick="endGame()">🚫 Завершить игру</button>
                ` : ''}
            `;
            bottom.appendChild(exitBtn);
        }
        function toggleCat(id){document.getElementById('row-'+id).classList.toggle('collapsed');document.getElementById('arrow-'+id).classList.toggle('open');}
        function selectPlayer(pid){
            selectedPlayerId = parseInt(pid);
            const p = state.players.find(p => parseInt(p.id) === parseInt(pid));
            if (p) toast(`Выбран: ${p.name}`,'');
            renderGame();
        }
        function selectCard(cat,name){if(parseInt(state.currentPlayer)!==parseInt(playerId))return;selectedCard=(selectedCard&&selectedCard.category===cat&&selectedCard.cardName===name)?null:{category:cat,cardName:name};renderGame();}
        async function requestCard() {
            if(!selectedCard){toast('⚠️ Выберите карточку!','error');return;}
            const toPlayer=selectedPlayerId!==null?selectedPlayerId:state.players.find(p=>parseInt(p.id)!==parseInt(playerId))?.id;
            if(toPlayer===undefined){toast('⚠️ Выберите игрока!','error');return;}
            const fromName = state.players.find(p => parseInt(p.id) === parseInt(playerId))?.name || 'Игрок';
            const toName = state.players.find(p => parseInt(p.id) === parseInt(toPlayer))?.name || 'Игрок';
            try {
                const r=await fetch(API+'/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,fromPlayer:parseInt(playerId),toPlayer:parseInt(toPlayer),category:selectedCard.category,cardName:selectedCard.cardName})});
                const d=await r.json();
                if(d.ok){
                    if(d.found){
                        toast(`✅ ${fromName} запросил(а) "${selectedCard.cardName}" у ${toName}. Карта есть! Переходит к ${fromName}`, 'success');
                    }else{
                        const nextName = state.players.find(p => parseInt(p.id) === parseInt(d.nextPlayer))?.name || 'неизвестно';
                        toast(`❌ ${fromName} запросил(а) "${selectedCard.cardName}" у ${toName}. Карты нет. Ходит ${nextName}`, 'error');
                    }
                    selectedCard=null;selectedPlayerId=null;
                    fetchState();
                } else toast(d.error,'error');
            } catch(e){toast('Ошибка','error');}
        }
        function checkWin() {
            if(!state)return;
            const allCollected=state.players.reduce((s,p)=>s+p.quartets.length,0);
            if(allCollected>=state.categories.length||(state.bankCount===0&&state.players.every(p=>p.handCount===0))){
                clearInterval(pollTimer);
                document.getElementById('bottom-panel').classList.add('hidden');
                const sorted=[...state.players].sort((a,b)=>b.quartets.length-a.quartets.length);
                document.getElementById('app').innerHTML=`<div class="header"><h1 style="font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:var(--accent);">🏆 Игра окончена!</h1><div class="decor-line"></div></div>`+sorted.map((p,i)=>`<div class="score-item ${i===0&&sorted[0].quartets.length>0?'winner':''}"><span>${i===0?'👑 ':''}${p.name}</span><span style="color:var(--accent);font-weight:700;">${p.quartets.length} квартетов</span></div>`).join('')+'<button class="btn btn-primary btn-full" onclick="showMenu()">В меню</button>';
            }
        }
        async function leaveGame() {
            try {
                const r=await fetch(API+'/leave',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,playerId:parseInt(playerId)})});
                const d=await r.json();
                if(d.ok){
                    toast('🚪 Вы покинули игру', '');
                    clearInterval(pollTimer);
                    document.getElementById('bottom-panel').classList.add('hidden');
                    showMenu();
                } else toast(d.error,'error');
            } catch(e){toast('Ошибка','error');}
        }
        async function endGame() {
            if (!confirm('Вы уверены, что хотите завершить игру?')) return;
            try {
                const r=await fetch(API+'/end_game',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,playerId:parseInt(playerId)})});
                const d=await r.json();
                if(d.ok){
                    toast('🚫 Игра завершена', '');
                    clearInterval(pollTimer);
                    await fetchState();
                } else toast(d.error,'error');
            } catch(e){toast('Ошибка','error');}
        }
        showMenu();

        // ----- Обратная связь (чат) -----
        function openFeedback() {
            if (feedbackOpen) return;
            feedbackOpen = true;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'feedback-modal';
            
            // Загружаем историю сообщений
            fetch(API + '/feedback/chat/' + playerId)
                .then(res => res.json())
                .then(d => {
                    if (!d.ok) {
                        toast('Ошибка загрузки чата: ' + d.error, 'error');
                        return;
                    }
                    
                    let messagesHtml = '';
                    if (d.messages && d.messages.length > 0) {
                        messagesHtml = d.messages.map(m => `
                            <div class="chat-message ${m.from_admin ? 'admin' : 'user'}">
                                <div class="msg-header">
                                    <span class="sender">${m.from_admin ? '👑 Поддержка' : 'Вы'}</span>
                                    <span class="time">${m.time}</span>
                                </div>
                                <div class="msg-text">${m.text}</div>
                            </div>
                        `).join('');
                    } else {
                        messagesHtml = '<div style="text-align:center;color:var(--text2);font-size:13px;padding:20px;">Нет сообщений</div>';
                    }
                    
                    modal.innerHTML = `
                        <div class="modal-content">
                            <h3>💬 Поддержка</h3>
                            <div class="chat-messages">
                                ${messagesHtml}
                            </div>
                            <div class="chat-input-area">
                                <input type="text" id="chat-input" placeholder="Напишите сообщение..." />
                                <button class="btn btn-primary" onclick="sendChatMessage()">Отправить</button>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-secondary" onclick="closeFeedback()">← Закрыть</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    
                    // Прокрутка вниз
                    const chatDiv = modal.querySelector('.chat-messages');
                    if (chatDiv) chatDiv.scrollTop = chatDiv.scrollHeight;
                })
                .catch(() => toast('Ошибка загрузки чата', 'error'));
        }
        function closeFeedback() {
            feedbackOpen = false;
            const modal = document.getElementById('feedback-modal');
            if (modal) modal.remove();
        }
        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;
            
            fetch(API + '/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    code: roomCode || 'menu',
                    playerId: playerId,
                    name: playerName,
                    message: message
                })
            })
            .then(res => res.json())
            .then(d => {
                if (d.ok) {
                    input.value = '';
                    closeFeedback();
                    toast('✅ Сообщение отправлено!', 'success');
                } else {
                    toast('❌ ' + d.error, 'error');
                }
            })
            .catch(() => toast('Ошибка отправки', 'error'));
        }

        // ----- Правила -----
        function openRules() {
            if (rulesOpen) return;
            rulesOpen = true;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'rules-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>📜 Правила игры</h3>
                    <div class="rules-text">
                        <p><strong>Цель игры:</strong> Собрать как можно больше квартетов (4 карты одной категории).</p>
                        <ul>
                            <li>В игре 37 квартетов, всего 148 карт.</li>
                            <li>Каждому игроку раздаётся одинаковое количество карт (7, 10 или 15).</li>
                            <li>Остальные карты образуют «запас» (банк).</li>
                            <li>Игроки ходят по очереди. В свой ход можно <strong>попросить</strong> у любого другого игрока конкретную карту из категории, которая уже есть у вас в руке.</li>
                            <li>Если у соперника есть эта карта — он отдаёт её вам, и вы ходите снова.</li>
                            <li>Если у соперника нет этой карты — вы берёте одну карту из запаса, и ход переходит к следующему игроку.</li>
                            <li>Если вы собрали 4 карты одной категории — они выкладываются на стол (квартет), и вы получаете 1 очко.</li>
                            <li>Игра заканчивается, когда все квартеты собраны или когда запас пуст, и у всех игроков нет карт.</li>
                        </ul>
                        <p><strong>Дополнительно:</strong></p>
                        <ul>
                            <li>Если игрок не ходит более 1 минуты — ход переходит к следующему.</li>
                            <li>Если игрок пропускает ход дважды — он автоматически покидает игру.</li>
                            <li>Создатель комнаты может завершить игру досрочно.</li>
                            <li>Игрок может покинуть игру в любой момент (кнопка «Покинуть игру»).</li>
                        </ul>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="closeRules()">← Закрыть</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        function closeRules() {
            rulesOpen = false;
            const modal = document.getElementById('rules-modal');
            if (modal) modal.remove();
        }

        // ----- Панель администратора -----
        function openAdminPanel() {
            if (adminOpen) return;
            if (!ADMIN_IDS.includes(parseInt(playerId))) {
                toast('Доступ только для администраторов', 'error');
                return;
            }
            adminOpen = true;
            
            fetch(API + '/admin/games/' + playerId)
                .then(res => res.json())
                .then(g => {
                    if (!g.ok) {
                        toast('Ошибка загрузки игр: ' + g.error, 'error');
                        adminOpen = false;
                        return;
                    }
                    
                    const modal = document.createElement('div');
                    modal.className = 'modal-overlay';
                    modal.id = 'admin-modal';
                    
                    let gamesHtml = '';
                    if (g.games && g.games.length > 0) {
                        gamesHtml = g.games.map(game => `
                            <div class="game-item" style="padding:8px 12px;background:rgba(123,75,42,0.05);border-radius:8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;font-size:13px;">
                                <div>
                                    <span class="status-indicator ${game.status === 'playing' ? 'active' : 'finished'}" style="display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;${game.status === 'playing' ? 'background:#27ae60;' : 'background:#c0392b;'}"></span>
                                    <strong>${game.code}</strong>
                                    <span style="font-size:11px;color:var(--text2);margin-left:6px;">${game.status === 'playing' ? '🟢' : '🔴'}</span>
                                    <span style="font-size:11px;color:var(--text2);margin-left:6px;">👤 ${game.players.map(p => p.name).join(', ')}</span>
                                    <span style="font-size:11px;color:var(--text2);margin-left:6px;">👑 ${game.ownerId}</span>
                                </div>
                                ${game.status === 'playing' ? `
                                <button class="observe-btn" onclick="observeGame('${game.code}')" style="padding:4px 12px;font-size:11px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;">👁 Наблюдать</button>
                                ` : `
                                <button class="observe-btn" onclick="viewGameStats('${game.code}')" style="padding:4px 12px;font-size:11px;background:var(--accent2);color:#fff;border:none;border-radius:6px;cursor:pointer;">📊 Просмотр</button>
                                `}
                            </div>
                        `).join('');
                    } else {
                        gamesHtml = '<p style="font-size:13px;color:var(--text2);">Активных игр нет</p>';
                    }
                    
                    modal.innerHTML = `
                        <div class="modal-content">
                            <h3>📊 Панель администратора</h3>
                            <div class="section-title" style="font-weight:600;font-size:14px;color:var(--accent);margin-top:12px;margin-bottom:6px;">🎮 Игры</div>
                            ${gamesHtml}
                            <div class="btn-group" style="margin-top:12px;">
                                <button class="btn btn-secondary" onclick="closeAdminPanel()">← Закрыть</button>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(modal);
                });
        }
        function closeAdminPanel() {
            adminOpen = false;
            const modal = document.getElementById('admin-modal');
            if (modal) modal.remove();
        }
        function observeGame(code) {
            closeAdminPanel();
            if (!ADMIN_IDS.includes(parseInt(playerId))) {
                toast('Доступ только для администраторов', 'error');
                return;
            }
            fetch(API + '/observe/' + code + '/' + playerId, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            })
            .then(res => res.json())
            .then(d => {
                if (d.ok) {
                    roomCode = d.roomCode;
                    playerId = d.playerId;
                    isObserver = true;
                    startPolling();
                    toast('👁 Вы вошли в игру как наблюдатель', 'success');
                } else {
                    toast('Ошибка: ' + d.error, 'error');
                }
            })
            .catch(() => toast('Ошибка подключения', 'error'));
        }
        function viewGameStats(code) {
            closeAdminPanel();
            fetch(API + '/game_stats/' + code)
                .then(res => res.json())
                .then(d => {
                    if (!d.ok) {
                        toast('Ошибка загрузки: ' + d.error, 'error');
                        return;
                    }
                    toast('📊 Статистика игры ' + code + ': ' + JSON.stringify(d), 'info');
                })
                .catch(() => toast('Ошибка загрузки статистики', 'error'));
        }
    </script>
</body>
</html>
