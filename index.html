<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d1a; --card: #1a1a35; --accent: #e2a03f; --accent2: #7c3aed;
            --text: #f1f5f9; --text2: #94a3b8; --green: #10b981; --red: #ef4444; --border: #2d2d4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif; background: var(--bg);
            color: var(--text); min-height: 100vh; padding: 16px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .header { text-align: center; padding: 16px 0; }
        .header h1 { font-size: 22px; color: var(--accent); }
        .btn {
            width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer; margin: 6px 0;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-small { padding: 10px 20px; font-size: 14px; width: auto; display: inline-block; margin: 4px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* КАРТОЧКА КАТЕГОРИИ */
        .category-card {
            background: var(--card); border: 2px solid var(--border);
            border-radius: 20px; overflow: hidden; margin-bottom: 14px;
            cursor: pointer; transition: all 0.3s; position: relative;
        }
        .category-card:hover { border-color: var(--accent); }
        .category-card.selected { border-color: var(--accent2); box-shadow: 0 0 20px rgba(124, 58, 237, 0.4); }
        .category-card.completed { border-color: var(--green); }
        .category-card .card-bg {
            width: 100%; height: 200px; object-fit: cover;
            filter: brightness(0.5);
        }
        .category-card .card-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            padding: 16px; display: flex; flex-direction: column;
            justify-content: space-between;
        }
        .category-card .cat-title {
            font-size: 16px; font-weight: bold; color: var(--accent);
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .category-card .cat-count {
            position: absolute; top: 12px; right: 12px;
            font-size: 14px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 10px;
        }
        .category-card .cat-list {
            list-style: none; padding: 0; margin-top: auto;
        }
        .category-card .cat-list li {
            padding: 3px 0; font-size: 14px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }
        .category-card .cat-list li.owned {
            font-weight: bold; font-size: 16px; color: #fff;
        }
        .category-card .cat-list li.missing {
            color: rgba(255,255,255,0.5); font-size: 12px;
        }
        .completed-badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--green); color: #fff; font-size: 11px;
            padding: 4px 10px; border-radius: 12px; font-weight: bold;
            z-index: 5;
        }

        .game-log {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; margin: 12px 0;
            max-height: 100px; overflow-y: auto; font-size: 12px; color: var(--text2);
        }
        .game-log p { margin: 2px 0; }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: flex;
            align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: var(--card); border-radius: 16px; padding: 24px;
            max-width: 400px; width: 90%; text-align: center;
        }
        .modal-content h2 { margin-bottom: 16px; color: var(--accent); }
        .modal-content .choice-btn {
            display: block; width: 100%; padding: 14px; margin: 8px 0;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-size: 16px;
            cursor: pointer; transition: all 0.2s;
        }
        .modal-content .choice-btn:hover { border-color: var(--accent); }

        .hidden { display: none !important; }
        .scoreboard { text-align: center; margin: 16px 0; }
        .score-item {
            background: var(--card); border-radius: 12px; padding: 12px;
            margin: 8px 0; display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="main-menu">
            <div class="header">
                <h1>📖 Библейский квартет</h1>
                <p style="color:var(--text2)">37 квартетов · 148 карт</p>
            </div>
            <button class="btn btn-primary" onclick="showCardCountChoice()">🎮 Играть с ботом</button>
        </div>

        <!-- ВЫБОР КОЛИЧЕСТВА КАРТ -->
        <div id="card-count-screen" class="hidden">
            <div class="header"><h2>🃏 Сколько карт раздать?</h2></div>
            <button class="btn btn-primary" onclick="startGame(8)">8 карт</button>
            <button class="btn btn-primary" onclick="startGame(10)">10 карт (рекомендуем)</button>
            <button class="btn btn-primary" onclick="startGame(15)">15 карт</button>
            <button class="btn btn-secondary" onclick="showMainMenu()">← Назад</button>
        </div>

        <!-- ИГРА -->
        <div id="game-screen" class="hidden">
            <div class="header">
                <h2 id="game-status" style="color:var(--accent)"></h2>
                <p style="color:var(--text2)" id="turn-info"></p>
            </div>
            <div class="game-log" id="game-log"></div>
            <div id="categories-container"></div>
            <button class="btn btn-primary hidden" id="request-btn" onclick="showRequestModal()">❓ Запросить карту</button>
            <button class="btn btn-danger hidden" id="end-btn" onclick="endTurn()">✅ Закончить ход</button>
        </div>

        <!-- МОДАЛКА ЗАПРОСА -->
        <div id="request-modal" class="modal hidden">
            <div class="modal-content">
                <h2>❓ У кого запросить?</h2>
                <div id="player-choose-list"></div>
                <button class="btn btn-secondary" onclick="closeRequestModal()">Отмена</button>
            </div>
        </div>

        <!-- ПОБЕДА -->
        <div id="win-screen" class="hidden">
            <div class="header">
                <h1>🏆 Игра окончена!</h1>
                <div class="scoreboard" id="scoreboard"></div>
                <button class="btn btn-primary" onclick="showMainMenu()">В меню</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        let gameState = null;
        let playerName = 'Игрок';
        let selectedCategory = null;

        if (tg?.initDataUnsafe?.user) {
            playerName = tg.initDataUnsafe.user.first_name || 'Игрок';
        }

        async function loadGameData() {
            const resp = await fetch('data.json');
            return await resp.json();
        }

        function showMainMenu() {
            document.querySelectorAll('#main-menu, #card-count-screen, #game-screen, #win-screen').forEach(el => el.classList.add('hidden'));
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function showCardCountChoice() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('card-count-screen').classList.remove('hidden');
        }

        async function startGame(cardsPerPlayer) {
            const data = await loadGameData();
            if (!data.length) return alert('Ошибка загрузки');

            // Создаём колоду
            let deck = [];
            data.forEach(q => {
                q.cards.forEach(c => {
                    deck.push({ category: q.name, categoryId: q.id, cardName: c.name, image: c.image });
                });
            });

            // АБСОЛЮТНЫЙ РАНДОМ
            deck = shuffle(deck);

            const playerHand = deck.splice(0, cardsPerPlayer);
            const botHand = deck.splice(0, cardsPerPlayer);
            const bank = deck;

            gameState = {
                players: [
                    { id: 0, name: playerName, hand: playerHand, quartets: [] },
                    { id: 1, name: 'Бот', hand: botHand, quartets: [] }
                ],
                bank: bank, currentPlayer: 0, log: [], data: data
            };

            document.getElementById('card-count-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            addLog(`🎮 Игра началась! У вас ${cardsPerPlayer} карт.`);
            updateGameUI();
        }

        function updateGameUI() {
            const me = gameState.players[0];
            const current = gameState.players[gameState.currentPlayer];
            document.getElementById('game-status').textContent = gameState.currentPlayer === 0 ? '🎯 Ваш ход' : '⏳ Бот думает...';
            document.getElementById('turn-info').textContent = `Ходит: ${current.name} | 🏆 Вы: ${me.quartets.length} | Бот: ${gameState.players[1].quartets.length}`;

            if (gameState.currentPlayer === 0) {
                document.getElementById('request-btn').classList.remove('hidden');
                document.getElementById('end-btn').classList.remove('hidden');
            } else {
                document.getElementById('request-btn').classList.add('hidden');
                document.getElementById('end-btn').classList.add('hidden');
                setTimeout(botTurn, 1200);
            }

            renderCategories();
            checkWin();
        }

        function renderCategories() {
            const me = gameState.players[0];
            const container = document.getElementById('categories-container');

            // Группируем карты игрока
            const playerGrouped = {};
            me.hand.forEach(card => {
                if (!playerGrouped[card.category]) playerGrouped[card.category] = [];
                playerGrouped[card.category].push(card);
            });

            container.innerHTML = gameState.data.map(q => {
                const owned = playerGrouped[q.name] || [];
                const ownedCount = owned.length;
                const isComplete = ownedCount === 4;
                const isSelected = selectedCategory === q.name;
                const ownedNames = owned.map(c => c.cardName);
                
                // Берём первую карту как фон
                const bgImage = owned.length > 0 ? owned[0].image : q.cards[0].image;

                const listHTML = q.cards.map(c => {
                    const isOwned = ownedNames.includes(c.name);
                    return `<li class="${isOwned ? 'owned' : 'missing'}">${isOwned ? '✅' : '◻'} ${c.name}</li>`;
                }).join('');

                return `
                    <div class="category-card ${isComplete ? 'completed' : ''} ${isSelected ? 'selected' : ''}" 
                         onclick="selectCategory('${q.name.replace(/'/g, "\\'")}')">
                        ${isComplete ? '<div class="completed-badge">СОБРАН!</div>' : ''}
                        <img class="card-bg" src="${bgImage}" alt="${q.name}" onerror="this.style.display='none'">
                        <div class="card-overlay">
                            <div class="cat-title">${q.name}</div>
                            <div class="cat-count">${ownedCount}/4</div>
                            <ul class="cat-list">${listHTML}</ul>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function selectCategory(category) {
            if (gameState.currentPlayer !== 0) return;
            if (selectedCategory === category) {
                selectedCategory = null;
            } else {
                selectedCategory = category;
            }
            renderCategories();
        }

        function showRequestModal() {
            if (!selectedCategory) {
                alert('Сначала выберите категорию!');
                return;
            }

            const me = gameState.players[0];
            const owned = me.hand.filter(c => c.category === selectedCategory);
            if (owned.length === 0) {
                alert('У вас нет карт этой категории!');
                return;
            }

            const list = document.getElementById('player-choose-list');
            list.innerHTML = gameState.players.filter(p => p.id !== 0).map(p => `
                <div class="choice-btn" onclick="requestFromPlayer(${p.id}, '${selectedCategory.replace(/'/g, "\\'")}')">
                    ${p.name} (${p.hand.length} карт)
                </div>
            `).join('');
            document.getElementById('request-modal').classList.remove('hidden');
        }

        function closeRequestModal() {
            document.getElementById('request-modal').classList.add('hidden');
        }

        function requestFromPlayer(targetId, category) {
            closeRequestModal();

            const me = gameState.players[0];
            const target = gameState.players.find(p => p.id === targetId);
            const allCards = gameState.data.find(q => q.name === category).cards;
            const ownedNames = me.hand.filter(c => c.category === category).map(c => c.cardName);
            const missingCard = allCards.find(c => !ownedNames.includes(c.name));

            if (!missingCard) {
                alert('У вас все карты этой категории!');
                return;
            }

            const cardName = missingCard.name;
            const cardIndex = target.hand.findIndex(c => c.category === category && c.cardName === cardName);

            if (cardIndex !== -1) {
                const card = target.hand.splice(cardIndex, 1)[0];
                me.hand.push(card);
                addLog(`✅ Вы забрали "${cardName}" у ${target.name}!`);
                checkQuartets();
                selectedCategory = null;
                updateGameUI();
            } else {
                if (gameState.bank.length > 0) {
                    const newCard = gameState.bank.pop();
                    me.hand.push(newCard);
                    addLog(`❌ У ${target.name} нет "${cardName}". Берёте из банка.`);
                } else {
                    addLog(`❌ У ${target.name} нет "${cardName}". Банк пуст.`);
                }
                selectedCategory = null;
                gameState.currentPlayer = 1;
                updateGameUI();
            }
        }

        function endTurn() {
            selectedCategory = null;
            gameState.currentPlayer = 1;
            updateGameUI();
        }

        function botTurn() {
            if (gameState.currentPlayer !== 1) return;
            const bot = gameState.players[1];
            if (bot.hand.length === 0) { gameState.currentPlayer = 0; updateGameUI(); return; }

            const randomCard = bot.hand[Math.floor(Math.random() * bot.hand.length)];
            const target = gameState.players[0];
            const cardIndex = target.hand.findIndex(c => c.category === randomCard.category && c.cardName === randomCard.cardName);

            if (cardIndex !== -1) {
                const card = target.hand.splice(cardIndex, 1)[0];
                bot.hand.push(card);
                addLog(`😈 Бот забрал "${randomCard.cardName}"!`);
                checkQuartets();
            } else {
                if (gameState.bank.length > 0) {
                    const newCard = gameState.bank.pop();
                    bot.hand.push(newCard);
                    addLog(`🤖 Бот искал "${randomCard.cardName}". Взял из банка.`);
                } else {
                    addLog(`🤖 Бот искал "${randomCard.cardName}". Банк пуст.`);
                }
            }
            gameState.currentPlayer = 0;
            updateGameUI();
        }

        function checkQuartets() {
            [0, 1].forEach(pid => {
                const player = gameState.players[pid];
                const grouped = {};
                player.hand.forEach(card => {
                    if (!grouped[card.category]) grouped[card.category] = [];
                    grouped[card.category].push(card);
                });
                Object.entries(grouped).forEach(([cat, cards]) => {
                    if (cards.length === 4) {
                        player.quartets.push(cat);
                        player.hand = player.hand.filter(c => c.category !== cat);
                        addLog(`🏆 ${player.name} собрал квартет "${cat}"!`);
                    }
                });
            });
        }

        function checkWin() {
            const total = gameState.data.length;
            const p1 = gameState.players[0].quartets.length;
            const p2 = gameState.players[1].quartets.length;
            if (p1 + p2 >= total || (gameState.bank.length === 0 && gameState.players[0].hand.length === 0 && gameState.players[1].hand.length === 0)) {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = gameState.players.sort((a, b) => b.quartets.length - a.quartets.length).map(p => `
                <div class="score-item"><span>${p.quartets.length >= Math.max(...gameState.players.map(x => x.quartets.length)) ? '👑 ' : ''}${p.name}</span><span style="color:var(--accent)">${p.quartets.length} квартетов</span></div>
            `).join('');
        }

        function addLog(msg) {
            gameState.log.push(msg);
            const logEl = document.getElementById('game-log');
            logEl.innerHTML = gameState.log.slice(-8).map(m => `<p>${m}</p>`).join('');
            logEl.scrollTop = logEl.scrollHeight;
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        showMainMenu();
    </script>
</body>
</html>
