<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d1a; --card: #1a1a35; --accent: #e2a03f; --accent2: #7c3aed;
            --text: #f1f5f9; --text2: #94a3b8; --green: #10b981; --red: #ef4444; --border: #2d2d4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
        .container { max-width: 700px; margin: 0 auto; }
        .header { text-align: center; padding: 16px 0; }
        .header h1 { font-size: 22px; color: var(--accent); }
        .btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; margin: 6px 0; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Сетка карт */
        .hand-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        .mini-card {
            background: var(--card); border: 2px solid var(--border);
            border-radius: 10px; overflow: hidden; cursor: pointer;
            transition: all 0.2s; aspect-ratio: 3/4;
        }
        .mini-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .mini-card .badge-count {
            position: absolute; top: 4px; right: 4px;
            background: rgba(0,0,0,0.7); color: var(--accent);
            font-size: 10px; padding: 2px 6px; border-radius: 8px;
        }

        /* Модальное окно категории */
        .category-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex;
            align-items: center; justify-content: center; z-index: 100;
        }
        .category-modal-content {
            background: var(--card); border-radius: 20px; padding: 20px;
            max-width: 450px; width: 95%; text-align: center;
        }
        .category-modal-content h3 { color: var(--accent); margin-bottom: 12px; font-size: 18px; }
        .category-modal-content .slots {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .slot {
            background: var(--bg); border: 2px solid var(--border);
            border-radius: 12px; overflow: hidden; aspect-ratio: 3/4;
            position: relative; transition: all 0.2s;
        }
        .slot.owned { border-color: var(--green); }
        .slot.missing { border-color: var(--red); cursor: pointer; opacity: 0.6; }
        .slot.missing:hover { opacity: 1; border-color: var(--accent); transform: scale(1.03); }
        .slot img { width: 100%; height: 100%; object-fit: cover; }
        .slot .slot-status {
            position: absolute; top: 6px; left: 6px;
            font-size: 14px; background: rgba(0,0,0,0.7);
            padding: 2px 8px; border-radius: 8px;
        }
        .slot.owned .slot-status { color: var(--green); }
        .slot.missing .slot-status { color: var(--red); }
        .slot .slot-name {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7); padding: 4px 6px;
            font-size: 10px; color: #fff; text-align: center;
        }

        .game-log { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin: 12px 0; max-height: 80px; overflow-y: auto; font-size: 11px; color: var(--text2); }
        .game-log p { margin: 2px 0; }
        .hidden { display: none !important; }
        .scoreboard { text-align: center; margin: 16px 0; }
        .score-item { background: var(--card); border-radius: 12px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <div id="main-menu">
            <div class="header"><h1>📖 Библейский квартет</h1><p style="color:var(--text2)">37 квартетов · 148 карт</p></div>
            <button class="btn btn-primary" onclick="showCardCountChoice()">🎮 Играть с ботом</button>
        </div>
        <div id="card-count-screen" class="hidden">
            <div class="header"><h2>🃏 Сколько карт раздать?</h2></div>
            <button class="btn btn-primary" onclick="startGame(7)">7 карт</button>
            <button class="btn btn-primary" onclick="startGame(10)">10 карт</button>
            <button class="btn btn-primary" onclick="startGame(15)">15 карт</button>
            <button class="btn btn-secondary" onclick="showMainMenu()">← Назад</button>
        </div>
        <div id="game-screen" class="hidden">
            <div class="header"><h2 id="game-status" style="color:var(--accent)"></h2><p style="color:var(--text2)" id="turn-info"></p></div>
            <div class="game-log" id="game-log"></div>
            <div class="hand-grid" id="hand-grid"></div>
            <button class="btn btn-danger hidden" id="end-btn" onclick="endTurn()">✅ Закончить ход</button>
        </div>
        <div id="category-modal" class="category-modal hidden">
            <div class="category-modal-content">
                <h3 id="cat-modal-title"></h3>
                <div class="slots" id="cat-slots"></div>
                <button class="btn btn-secondary" style="margin-top:12px;" onclick="closeCategoryModal()">Закрыть</button>
            </div>
        </div>
        <div id="win-screen" class="hidden">
            <div class="header"><h1>🏆 Игра окончена!</h1><div class="scoreboard" id="scoreboard"></div><button class="btn btn-primary" onclick="showMainMenu()">В меню</button></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }
        let gameState = null;
        let playerName = 'Игрок';
        if (tg?.initDataUnsafe?.user) playerName = tg.initDataUnsafe.user.first_name || 'Игрок';

        async function loadData() { const r = await fetch('data.json'); return await r.json(); }
        function showMainMenu() { document.querySelectorAll('#main-menu, #card-count-screen, #game-screen, #win-screen').forEach(e => e.classList.add('hidden')); document.getElementById('main-menu').classList.remove('hidden'); }
        function showCardCountChoice() { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('card-count-screen').classList.remove('hidden'); }

        async function startGame(n) {
            const data = await loadData();
            if (!data.length) return alert('Ошибка');
            let deck = [];
            data.forEach(q => q.cards.forEach(c => deck.push({ category: q.name, categoryId: q.id, cardName: c.name, image: c.image })));
            deck = shuffle(deck);
            gameState = { players: [{ id: 0, name: playerName, hand: deck.splice(0, n), quartets: [] }, { id: 1, name: 'Бот', hand: deck.splice(0, n), quartets: [] }], bank: deck, currentPlayer: 0, log: [], data: data };
            document.getElementById('card-count-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            addLog(`🎮 Игра началась! У вас ${n} карт. Нажмите на карту чтобы открыть категорию.`);
            updateUI();
        }

        function updateUI() {
            const me = gameState.players[0], cur = gameState.players[gameState.currentPlayer];
            document.getElementById('game-status').textContent = gameState.currentPlayer === 0 ? '🎯 Ваш ход' : '⏳ Бот думает...';
            document.getElementById('turn-info').textContent = `Ходит: ${cur.name} | 🏆 Вы: ${me.quartets.length} | Бот: ${gameState.players[1].quartets.length}`;
            if (gameState.currentPlayer === 0) document.getElementById('end-btn').classList.remove('hidden');
            else { document.getElementById('end-btn').classList.add('hidden'); setTimeout(botTurn, 1200); }
            renderHand(); checkWin();
        }

        function renderHand() {
            const grid = document.getElementById('hand-grid');
            const me = gameState.players[0];
            const grouped = {};
            me.hand.forEach(c => { if (!grouped[c.category]) grouped[c.category] = []; grouped[c.category].push(c); });

            // Показываем по одной карте из каждой категории
            grid.innerHTML = Object.entries(grouped).sort().map(([cat, cards]) => {
                const card = cards[0];
                return `
                    <div class="mini-card" onclick="openCategory('${cat.replace(/'/g, "\\'")}')" style="position:relative;">
                        <img src="${card.image}" alt="${cat}" onerror="this.style.display='none'">
                        <div class="badge-count">${cards.length}/4</div>
                    </div>
                `;
            }).join('');
        }

        function openCategory(cat) {
            if (gameState.currentPlayer !== 0) return;
            const me = gameState.players[0];
            const q = gameState.data.find(q => q.name === cat);
            if (!q) return;

            const ownedNames = me.hand.filter(c => c.category === cat).map(c => c.cardName);
            document.getElementById('cat-modal-title').textContent = cat;
            document.getElementById('cat-slots').innerHTML = q.cards.map(c => {
                const isOwned = ownedNames.includes(c.name);
                return `
                    <div class="slot ${isOwned ? 'owned' : 'missing'}" 
                         ${!isOwned ? `onclick="requestMissingCard('${cat.replace(/'/g, "\\'")}', '${c.name.replace(/'/g, "\\'")}')"` : ''}>
                        <img src="${c.image}" alt="${c.name}" onerror="this.style.display='none'">
                        <div class="slot-status">${isOwned ? '✅' : '❓'}</div>
                        <div class="slot-name">${c.name}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('category-modal').classList.remove('hidden');
        }

        function closeCategoryModal() { document.getElementById('category-modal').classList.add('hidden'); }

        function requestMissingCard(cat, name) {
            closeCategoryModal();
            const me = gameState.players[0];
            const bot = gameState.players[1];
            const idx = bot.hand.findIndex(c => c.category === cat && c.cardName === name);

            if (idx !== -1) {
                me.hand.push(bot.hand.splice(idx, 1)[0]);
                addLog(`✅ Вы забрали "${name}" у бота!`);
                checkQuartets();
                updateUI();
            } else {
                if (gameState.bank.length) {
                    me.hand.push(gameState.bank.pop());
                    addLog(`❌ У бота нет "${name}". Берёте случайную карту из банка.`);
                } else {
                    addLog(`❌ У бота нет "${name}". Банк пуст.`);
                }
                gameState.currentPlayer = 1;
                updateUI();
            }
        }

        function endTurn() { gameState.currentPlayer = 1; updateUI(); }

        function botTurn() {
            if (gameState.currentPlayer !== 1) return;
            const bot = gameState.players[1];
            if (!bot.hand.length) { gameState.currentPlayer = 0; updateUI(); return; }
            const card = bot.hand[Math.floor(Math.random() * bot.hand.length)];
            const idx = gameState.players[0].hand.findIndex(c => c.category === card.category && c.cardName === card.cardName);
            if (idx !== -1) { bot.hand.push(gameState.players[0].hand.splice(idx, 1)[0]); addLog(`😈 Бот забрал "${card.cardName}"!`); checkQuartets(); }
            else { if (gameState.bank.length) { bot.hand.push(gameState.bank.pop()); addLog(`🤖 Бот искал "${card.cardName}". Взял из банка.`); } else addLog(`🤖 Бот искал "${card.cardName}". Банк пуст.`); }
            gameState.currentPlayer = 0; updateUI();
        }

        function checkQuartets() { [0, 1].forEach(pid => { const p = gameState.players[pid], g = {}; p.hand.forEach(c => { if (!g[c.category]) g[c.category] = []; g[c.category].push(c); }); Object.entries(g).forEach(([cat, cards]) => { if (cards.length === 4) { p.quartets.push(cat); p.hand = p.hand.filter(c => c.category !== cat); addLog(`🏆 ${p.name} собрал квартет "${cat}"!`); } }); }); }
        function checkWin() { const t = gameState.data.length, p1 = gameState.players[0].quartets.length, p2 = gameState.players[1].quartets.length; if (p1 + p2 >= t || (!gameState.bank.length && !gameState.players[0].hand.length && !gameState.players[1].hand.length)) endGame(); }
        function endGame() { document.getElementById('game-screen').classList.add('hidden'); document.getElementById('win-screen').classList.remove('hidden'); document.getElementById('scoreboard').innerHTML = gameState.players.sort((a, b) => b.quartets.length - a.quartets.length).map(p => `<div class="score-item"><span>${p.quartets.length >= Math.max(...gameState.players.map(x => x.quartets.length)) ? '👑 ' : ''}${p.name}</span><span style="color:var(--accent)">${p.quartets.length} квартетов</span></div>`).join(''); }
        function addLog(m) { gameState.log.push(m); const el = document.getElementById('game-log'); el.innerHTML = gameState.log.slice(-6).map(x => `<p>${x}</p>`).join(''); el.scrollTop = el.scrollHeight; }
        function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

        showMainMenu();
    </script>
</body>
</html>
