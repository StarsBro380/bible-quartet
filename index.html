<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8; --card: #fffef9; --accent: #7b4b2a; --accent2: #5b3ec9;
            --text: #1a0f08; --text2: #8a7568; --green: #27ae60; --red: #c0392b;
            --border: #e0d5c5; --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --history-bg: #a09080;
            --gradient: linear-gradient(135deg, #f5f0e8 0%, #e8ddd0 100%);
            --glass: rgba(255, 255, 255, 0.6);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Georgia', 'Times New Roman', serif;
            background: var(--bg);
            background: var(--gradient);
            color: var(--text);
            min-height: 100vh; padding: 12px; padding-bottom: 160px;
            -webkit-tap-highlight-color: transparent; user-select: none;
            font-size: 14px; line-height: 1.5;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header { text-align: center; padding: 8px 0 4px; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); font-weight: 700; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(123,75,42,0.1); }
        .header h2 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); font-weight: 700; }
        .btn {
            display: inline-block; padding: 10px 16px; font-size: 14px; font-weight: 600;
            border: none; border-radius: 8px; cursor: pointer; margin: 3px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            transform: scale(1);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(123, 75, 42, 0.2);
        }
        .btn:active {
            transform: scale(0.96) !important;
            transition-duration: 0.1s !important;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7b4b2a 0%, #8a5530 100%);
            color: #fff;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #8a5530 0%, #9a6038 100%);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text);
            border: 2px solid #d5c8b5;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.95);
            border-color: #7b4b2a;
        }
        .btn-full { width: 100%; display: block; }
        .input {
            width: 100%; padding: 8px 12px; font-size: 14px;
            border: 2px solid #d5c8b5; border-radius: 8px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
            color: var(--accent);
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(123,75,42,0.1); }
        .input-code { text-align: center; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; }
        .input-name { text-align: left; letter-spacing: 0; font-weight: normal; text-transform: none; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--accent);
            color: var(--text); padding: 12px 20px; border-radius: 12px;
            font-size: 13px; z-index: 100; opacity: 0; transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; max-width: 90%; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            font-weight: 500;
            transform: translateX(-50%) translateY(-20px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            margin: 8px 0; font-size: 13px; border: 2px solid var(--border); 
            box-shadow: var(--shadow-lg);
        }
        .info-bar .turn { color: var(--accent); font-weight: bold; font-size: 14px; }
        .info-bar .score { color: var(--text2); font-size: 12px; }
        .cat-section { margin: 4px 0; }
        .cat-header {
            background: linear-gradient(135deg, #7b4b2a 0%, #8a5530 100%);
            color: #fff;
            border: none; border-radius: 8px 8px 0 0;
            padding: 8px 14px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; box-shadow: 0 2px 8px rgba(123,75,42,0.2);
        }
        .cat-header .title { font-weight: bold; color: #fff; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .cat-header .badge { font-size: 11px; padding: 2px 10px; border-radius: 12px; font-weight: bold; }
        .badge-full { background: rgba(255,255,255,0.2); color: #fff; backdrop-filter: blur(4px); }
        .badge-partial { background: rgba(255,255,255,0.15); color: #fff; backdrop-filter: blur(4px); }
        .cat-header .arrow { font-size: 11px; transition: transform 0.3s; }
        .cat-header .arrow.open { transform: rotate(180deg); }
        .cards-row {
            display: flex; flex-wrap: wrap; gap: 4px; padding: 8px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid var(--border); border-top: none;
            border-radius: 0 0 8px 8px;
        }
        .cards-row.collapsed { display: none; }
        .card-chip {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #e0d5c5;
            border-radius: 8px; padding: 8px 8px; cursor: pointer;
            font-size: 12px; text-align: center;
            flex: 1 1 calc(50% - 4px); min-width: 80px; max-width: calc(50% - 4px);
            position: relative; color: var(--text);
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-chip.owned { border-color: #27ae60; background: rgba(39, 174, 96, 0.1); cursor: default; }
        .card-chip.missing { opacity: 0.6; border-style: dashed; background: rgba(250, 250, 250, 0.6); }
        .card-chip.missing:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 16px rgba(91, 62, 201, 0.12);
            opacity: 1;
        }
        .card-chip.selected {
            border-color: #5b3ec9 !important; background: rgba(91, 62, 201, 0.1) !important;
            box-shadow: 0 0 20px rgba(91,62,201,0.15);
            opacity: 1 !important; transform: scale(1.06) !important;
            animation: pulse 0.5s ease-in-out;
        }
        .card-chip .chip-name { font-size: 11px; line-height: 1.3; font-weight: 500; }
        @keyframes pulse {
            0%, 100% { transform: scale(1.06); }
            50% { transform: scale(1.10); }
        }
        .hidden { display: none !important; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .player-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #e0d5c5; border-radius: 8px;
            padding: 8px; flex: 1 1 calc(50% - 6px); min-width: 100px;
            text-align: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .player-card:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .player-card:active { border-color: var(--accent2); background: rgba(91,62,201,0.05); }
        .player-card.current {
            border-color: var(--accent);
            background: rgba(123, 75, 42, 0.08);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 6px rgba(123, 75, 42, 0.1); }
            to { box-shadow: 0 0 16px rgba(123, 75, 42, 0.2); }
        }
        .player-card.selected-player { border: 3px solid #5b3ec9; background: rgba(91,62,201,0.08); }
        .player-card .p-name { font-weight: bold; font-size: 13px; color: var(--accent); font-family: 'Playfair Display', serif; }
        .player-card .p-info { font-size: 10px; color: var(--text2); margin-top: 2px; }
        .score-item {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 8px; padding: 10px 14px;
            margin: 4px 0; display: flex; justify-content: space-between;
            font-size: 14px; border: 2px solid #e8dccf; box-shadow: var(--shadow-lg);
        }
        .winner { border-color: var(--accent); background: rgba(123,75,42,0.05); }
        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 2px solid #e8dccf;
            z-index: 50; padding: 6px 8px;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 24px rgba(0,0,0,0.06);
        }
        .history-container {
            max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .history-container.open { max-height: 250px; overflow-y: auto; }
        .history-toggle {
            font-size: 11px; color: #fff; cursor: pointer;
            text-align: center; padding: 6px 0; user-select: none;
            background: linear-gradient(135deg, #7b4b2a 0%, #8a5530 100%);
            border-radius: 6px;
            margin: 0 0 2px 0; font-weight: 600;
            border: 1px solid #5a3518;
            box-shadow: 0 2px 8px rgba(123,75,42,0.2);
        }
        .history-item {
            font-size: 10px; padding: 4px 8px; margin: 1px 0;
            border-radius: 4px; display: flex; gap: 6px; align-items: flex-start;
        }
        .history-item.ok { background: rgba(39, 174, 96, 0.1); border-left: 3px solid var(--green); }
        .history-item.no { background: rgba(192, 57, 43, 0.1); border-left: 3px solid var(--red); }
        .history-item.system { background: rgba(123, 75, 42, 0.08); border-left: 3px solid var(--accent); }
        .history-item .h-time { color: var(--text2); white-space: nowrap; font-size: 9px; }
        .history-item .h-text { flex: 1; }
        .action-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 2px; }
        .action-row .btn { flex: 1; min-width: 80px; padding: 8px; font-size: 12px; }
        .code-display {
            text-align: center; padding: 10px; margin: 4px 0;
            position: relative;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .code-display:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .code-display .code { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: bold; color: var(--accent); letter-spacing: 6px; }
        .code-display .copy-hint { color: var(--text2); font-size: 10px; margin-top: 4px; }
        .code-display .waiting { color: var(--text2); font-size: 10px; margin-top: 2px; }
        .players-waiting { margin: 4px 0; }
        .players-waiting .pw-item { padding: 6px 10px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            border-radius: 6px; margin: 2px 0; border: 1px solid var(--border);
            font-size: 13px; }
        .name-section { margin-bottom: 4px; }
        .name-section label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 2px; }
        .container > * {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .decor-line {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #7b4b2a, #8a5530);
            margin: 4px auto;
            border-radius: 2px;
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

        /* Бегущая пунктирная рамка — чистый вариант */
        .running-border {
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 12px;
            border: 2px dashed var(--accent);
            pointer-events: none;
            animation: dash-move 2s linear infinite;
            opacity: 0.7;
        }

        .code-display:hover .running-border {
            animation-direction: reverse;
            opacity: 1;
        }

        @keyframes dash-move {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }

        /* Панель игрока — отличается от кнопок */
        .player-panel {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 10px;
            border: 2px solid #d5c8b5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin: 2px 0;
            width: 100%;
            transition: all 0.3s;
        }

        .player-panel:hover {
            transform: scale(1.01);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .player-avatar {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f0e8, #e8ddd0);
            border-radius: 50%;
            border: 2px solid #d5c8b5;
            flex-shrink: 0;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--accent);
            font-family: 'Playfair Display', serif;
        }

        .player-role {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
        }

        /* Игроки, присоединившиеся позже */
        .player-panel:not(:first-child) {
            margin-top: 4px;
            background: rgba(255, 255, 255, 0.7);
            border-style: dashed;
        }

        .player-panel:not(:first-child) .player-avatar {
            background: linear-gradient(135deg, #e8ddd0, #d5c8b5);
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container" id="app"></div>
    <div class="bottom-panel hidden" id="bottom-panel">
        <div class="history-toggle" id="history-toggle" onclick="toggleHistory()">📜 История ▼</div>
        <div class="history-container" id="history-container">
            <div id="history-list"></div>
        </div>
        <div class="action-row" id="action-row"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor('#f5f0e8'); tg.setBackgroundColor('#f5f0e8'); }
        
        const API = 'https://bible-quartet-server.onrender.com';
        let state = null, playerId = null, roomCode = null, selectedCard = null, selectedPlayerId = null;
        let playerName = tg?.initDataUnsafe?.user?.first_name || '';
        let pollTimer = null, historyOpen = false;

        function toast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
            clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
        }
        function toggleHistory() {
            historyOpen = !historyOpen;
            const c = document.getElementById('history-container');
            const t = document.getElementById('history-toggle');
            if (historyOpen) { c.classList.add('open'); t.textContent = '📜 Свернуть ▲'; }
            else { c.classList.remove('open'); t.textContent = '📜 История ▼'; }
        }
        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || !history.length) { list.innerHTML = '<div class="history-item system"><span class="h-text">История пуста</span></div>'; return; }
            list.innerHTML = history.slice().reverse().map(h => `<div class="history-item ${h.type||'system'}"><span class="h-time">${h.time}</span><span class="h-text">${h.text}</span></div>`).join('');
        }
        function renderActions() {
            const row = document.getElementById('action-row');
            const cp = parseInt(state?.currentPlayer);
            const pid = parseInt(playerId);
            if (!state || cp !== pid) {
                row.innerHTML = '<span style="color:var(--text2);font-size:11px;">⏳ Ожидание хода другого игрока... (вы #'+pid+', ходит #'+cp+')</span>';
                return;
            }
            if (selectedCard) { row.innerHTML = `<button class="btn btn-primary" onclick="requestCard()">❓ Просить "${selectedCard.cardName}"</button>`; }
            else { row.innerHTML = '<span style="color:var(--text2);font-size:11px;">👆 Выберите карточку и игрока</span>'; }
        }
        function showMenu() {
            clearInterval(pollTimer);
            document.getElementById('bottom-panel').classList.add('hidden');
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:10px;max-width:400px;margin:0 auto;padding-top:8px;">
                    <div class="header" style="width:100%;">
                        <h1 style="text-align:center;">📖 Библейский квартет</h1>
                        <div class="decor-line"></div>
                    </div>
                    <div class="name-section" style="width:100%;">
                        <label style="text-align:center;display:block;font-size:12px;color:var(--text2);">Ваше имя</label>
                        <input class="input input-name" id="player-name" value="${playerName}" maxlength="20" style="text-align:center;"
                               onblur="saveNameFromMenu()" onkeydown="if(event.key==='Enter') saveNameFromMenu()">
                    </div>
                    <button class="btn btn-primary" style="width:100%;max-width:300px;" onclick="saveNameAndCreate()">🎮 Создать игру</button>
                    <button class="btn btn-secondary" style="width:100%;max-width:300px;" onclick="saveNameAndJoin()">🔗 Присоединиться</button>
                </div>
            `;
            window.saveNameFromMenu = function() {
                const newName = document.getElementById('player-name').value.trim() || 'Игрок';
                playerName = newName;
            };
        }
        function saveNameAndCreate() { showCreate(); }
        function saveNameAndJoin() { showJoin(); }
        function showCreate() {
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:8px;max-width:400px;margin:0 auto;padding-top:8px;">
                    <div class="header" style="width:100%;">
                        <h2 style="text-align:center;color:var(--accent);">Создание игры</h2>
                        <div class="decor-line"></div>
                    </div>
                    <div style="width:100%;display:flex;flex-direction:column;gap:6px;">
                        <button class="btn btn-primary btn-full" onclick="createGame(7)" style="width:100%;border-radius:8px;">
                            <div style="display:flex;flex-direction:column;align-items:center;">
                                <span style="font-size:14px;font-weight:bold;">🃏 7 карт</span>
                                <span style="font-size:10px;opacity:0.8;margin-top:1px;">👥 3–21 игрок</span>
                            </div>
                        </button>
                        <button class="btn btn-primary btn-full" onclick="createGame(10)" style="width:100%;border-radius:8px;">
                            <div style="display:flex;flex-direction:column;align-items:center;">
                                <span style="font-size:14px;font-weight:bold;">🃏 10 карт</span>
                                <span style="font-size:10px;opacity:0.8;margin-top:1px;">👥 3–14 игроков</span>
                            </div>
                        </button>
                        <button class="btn btn-primary btn-full" onclick="createGame(15)" style="width:100%;border-radius:8px;">
                            <div style="display:flex;flex-direction:column;align-items:center;">
                                <span style="font-size:14px;font-weight:bold;">🃏 15 карт</span>
                                <span style="font-size:10px;opacity:0.8;margin-top:1px;">👥 3–9 игроков</span>
                            </div>
                        </button>
                        <button class="btn btn-secondary btn-full" onclick="showMenu()" style="width:100%;border-radius:8px;">← Назад</button>
                    </div>
                </div>
            `;
        }
        function showJoin() {
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:8px;max-width:400px;margin:0 auto;padding-top:8px;">
                    <div class="header" style="width:100%;">
                        <h2 style="text-align:center;color:var(--accent);">Подключение</h2>
                        <div class="decor-line"></div>
                    </div>
                    <input class="input input-code" id="join-code" placeholder="ABC123" maxlength="6" style="width:100%;max-width:300px;text-align:center;">
                    <button class="btn btn-primary btn-full" onclick="joinGame()" style="width:100%;max-width:300px;">🔗 Присоединиться</button>
                    <button class="btn btn-secondary btn-full" onclick="showMenu()" style="width:100%;max-width:300px;">← Назад</button>
                </div>
            `;
        }
        async function createGame(n) {
            try {
                const r = await fetch(API+'/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:playerName,cards:n})});
                const d = await r.json();
                if(d.ok){roomCode=d.code;playerId=parseInt(d.playerId);showLobby();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        async function joinGame() {
            const code=document.getElementById('join-code').value.trim().toUpperCase();
            if(!code){toast('Введите код','error');return;}
            try {
                const r=await fetch(API+'/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,name:playerName})});
                const d=await r.json();
                if(d.ok){roomCode=code;playerId=parseInt(d.playerId);startPolling();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        async function startGame() {
            try {
                const r=await fetch(API+'/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,playerId})});
                const d=await r.json();
                if(d.ok){startPolling();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        function copyCode(){if(!roomCode)return;navigator.clipboard.writeText(roomCode).then(()=>toast('📋 Код скопирован!','success')).catch(()=>toast('Не удалось скопировать','error'));}
        function showLobby() {
            clearInterval(pollTimer);
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;max-width:400px;margin:0 auto;">
                    <div class="header" style="width:100%;padding:4px 0 2px;">
                        <h1 style="font-size:18px;font-family:'Playfair Display',serif;color:var(--accent);">📖 Библейский квартет</h1>
                        <div class="decor-line" style="width:40px;height:2px;margin:4px auto;"></div>
                    </div>
                    <div class="name-section" style="width:100%;margin-bottom:2px;">
                        <label style="text-align:center;display:block;font-size:12px;color:var(--text2);">Ваше имя</label>
                        <input class="input input-name" id="lobby-name" value="${playerName}" maxlength="20" 
                               style="text-align:center;padding:8px 12px;font-size:14px;border-radius:8px;"
                               onblur="autoUpdateName()" onkeydown="if(event.key==='Enter') autoUpdateName()">
                    </div>
                    <div class="code-display" onclick="copyCode()" style="width:100%;padding:10px;margin:2px 0;">
                        <div class="running-border"></div>
                        <div class="code" style="font-size:28px;letter-spacing:6px;font-family:'Playfair Display',serif;color:var(--accent);font-weight:bold;">${roomCode}</div>
                        <p class="copy-hint" style="font-size:10px;color:var(--text2);margin-top:4px;">📋 Нажмите, чтобы скопировать</p>
                        <p class="waiting" style="font-size:10px;color:var(--text2);margin-top:2px;">Поделитесь кодом с другими игроками</p>
                    </div>
                    <div class="players-waiting" id="players-waiting" style="width:100%;margin:2px 0;">
                        <div class="player-panel">
                            <div class="player-avatar">👤</div>
                            <div class="player-info">
                                <span class="player-name">${playerName}</span>
                                <span class="player-role">Создатель</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="startGame()" style="width:100%;max-width:300px;padding:10px;font-size:14px;border-radius:8px;">🎮 Начать игру</button>
                    <button class="btn btn-secondary btn-full" onclick="clearInterval(pollTimer);showMenu();" style="width:100%;max-width:300px;padding:10px;font-size:14px;border-radius:8px;">← Отмена</button>
                </div>
            `;
            window.autoUpdateName = async function() {
                const newName = document.getElementById('lobby-name').value.trim() || 'Игрок';
                if (newName !== playerName) {
                    try {
                        const r = await fetch(API+'/rename', {
                            method: 'POST',
                            headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({code: roomCode, playerId: playerId, name: newName})
                        });
                        const d = await r.json();
                        if(d.ok) {
                            playerName = newName;
                            toast('✅ Имя обновлено!', 'success');
                        } else {
                            toast(d.error, 'error');
                        }
                    } catch(e) {
                        toast('Ошибка при обновлении имени', 'error');
                    }
                }
            };
            pollTimer = setInterval(async () => {
                try {
                    const r = await fetch(`${API}/state/${roomCode}/${playerId}`);
                    const d = await r.json();
                    if (d.ok) {
                        const container = document.getElementById('players-waiting');
                        if (container) {
                            // Оставляем первого игрока (создателя)
                            const creatorDiv = container.querySelector('.player-panel');
                            // Удаляем всех кроме первого
                            while (container.children.length > 1) {
                                container.removeChild(container.lastChild);
                            }
                            // Добавляем остальных игроков
                            d.players.forEach(p => {
                                if (p.id === d.ownerId) return;
                                const div = document.createElement('div');
                                div.className = 'player-panel';
                                div.style.marginTop = '4px';
                                div.innerHTML = `
                                    <div class="player-avatar">👤</div>
                                    <div class="player-info">
                                        <span class="player-name">${p.name}</span>
                                        <span class="player-role">Игрок</span>
                                    </div>
                                `;
                                container.appendChild(div);
                            });
                        }
                        if (d.status === 'playing') {
                            fetchState();
                        }
                    }
                } catch (e) {}
            }, 1000);
        }
        function startPolling() {
            if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
            fetchState();
            pollTimer=setInterval(fetchState,1000);
        }
        async function fetchState() {
            if(!roomCode||playerId===null)return;
            try {
                const r=await fetch(`${API}/state/${roomCode}/${playerId}`);
                const d=await r.json();
                if(d.ok){
                    d.currentPlayer=parseInt(d.currentPlayer);d.playerId=parseInt(d.playerId);
                    d.bankCount=parseInt(d.bankCount);d.ownerId=parseInt(d.ownerId);
                    if(d.players)d.players.forEach(p=>{p.id=parseInt(p.id);p.handCount=parseInt(p.handCount);});
                    state=d;
                    renderGame();
                }
            } catch(e){}
        }
        function renderGame() {
            if(!state||state.status==='lobby'){showLobby();return;}
            document.getElementById('bottom-panel').classList.remove('hidden');
            const me=state.players.find(p=>parseInt(p.id)===parseInt(playerId));
            if(!me)return;
            const isMyTurn = parseInt(state.currentPlayer) === parseInt(playerId);
            const curObj = state.players.find(p => parseInt(p.id) === parseInt(state.currentPlayer));
            const curName = curObj ? curObj.name : 'Неизвестно';
            let html=`<div class="info-bar"><span class="turn">${isMyTurn?'🎯 Ваш ход':'⏳ Ход: '+curName}</span><span class="score">🏆 ${me.quartets.length} | Запас: ${state.bankCount}</span></div>`;
            html+='<div class="player-list">';
            for(const p of state.players){
                if(parseInt(p.id)===parseInt(playerId))continue;
                const isSelected = selectedPlayerId === parseInt(p.id);
                html+=`<div class="player-card ${parseInt(state.currentPlayer)===parseInt(p.id)?'current':''} ${isSelected?'selected-player':''}" onclick="selectPlayer(${p.id})"><div class="p-name">${p.name}</div><div class="p-info">🃏 ${p.handCount} карт | 🏆 ${p.quartets.length} квартетов</div></div>`;
            }
            html+='</div>';
            const grouped={};if(me.hand)me.hand.forEach(c=>{if(!grouped[c.category])grouped[c.category]=[];grouped[c.category].push(c);});
            const allCats={};state.categories.forEach(q=>{allCats[q.name]=q.cards.map(c=>({name:c.name,category:q.name,owned:me.hand?me.hand.some(h=>h.category===q.name&&h.cardName===c.name):false}));});
            const active=Object.keys(grouped).sort();
            if(!active.length)html+='<p style="text-align:center;padding:30px;color:var(--text2);font-size:13px;">У вас нет карт</p>';
            else {html+=active.map(cat=>{const cards=allCats[cat]||[],cnt=grouped[cat].length,done=cnt===4;const catId=cat.replace(/[^a-zA-Zа-яА-Я0-9]/g,'_');return `<div class="cat-section"><div class="cat-header" onclick="toggleCat('${catId}')"><span class="title">${cat}</span><span class="badge ${done?'badge-full':'badge-partial'}">${cnt}/4${done?' ✅':''}</span><span class="arrow" id="arrow-${catId}">▼</span></div><div class="cards-row" id="row-${catId}">${cards.map(c=>{const o=c.owned;const s=selectedCard&&selectedCard.category===cat&&selectedCard.cardName===c.name;return o?`<div class="card-chip owned"><div class="chip-name">✅ ${c.name}</div></div>`:`<div class="card-chip missing ${s?'selected':''}" onclick="selectCard('${cat.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}')"><div class="chip-name">🃏 ${c.name}</div></div>`;}).join('')}</div></div>`;}).join('');}
            document.getElementById('app').innerHTML=html;renderHistory(state.history);renderActions();checkWin();
        }
        function toggleCat(id){document.getElementById('row-'+id).classList.toggle('collapsed');document.getElementById('arrow-'+id).classList.toggle('open');}
        function selectPlayer(pid){
            selectedPlayerId = parseInt(pid);
            const p = state.players.find(p => parseInt(p.id) === parseInt(pid));
            if (p) toast(`Выбран: ${p.name}`,'');
            renderGame();
        }
        function selectCard(cat,name){if(parseInt(state.currentPlayer)!==parseInt(playerId))return;selectedCard=(selectedCard&&selectedCard.category===cat&&selectedCard.cardName===name)?null:{category:cat,cardName:name};renderGame();}
        async function requestCard() {
            if(!selectedCard){toast('⚠️ Выберите карточку!','error');return;}
            const toPlayer=selectedPlayerId!==null?selectedPlayerId:state.players.find(p=>parseInt(p.id)!==parseInt(playerId))?.id;
            if(toPlayer===undefined){toast('⚠️ Выберите игрока!','error');return;}
            const fromName = state.players.find(p => parseInt(p.id) === parseInt(playerId))?.name || 'Игрок';
            const toName = state.players.find(p => parseInt(p.id) === parseInt(toPlayer))?.name || 'Игрок';
            try {
                const r=await fetch(API+'/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,fromPlayer:parseInt(playerId),toPlayer:parseInt(toPlayer),category:selectedCard.category,cardName:selectedCard.cardName})});
                const d=await r.json();
                if(d.ok){
                    if(d.found){
                        toast(`✅ ${fromName} запросил(а) "${selectedCard.cardName}" у ${toName}. Карта есть! Переходит к ${fromName}`, 'success');
                    }else{
                        const nextName = state.players.find(p => parseInt(p.id) === parseInt(d.nextPlayer))?.name || 'неизвестно';
                        toast(`❌ ${fromName} запросил(а) "${selectedCard.cardName}" у ${toName}. Карты нет. Ходит ${nextName}`, 'error');
                    }
                    selectedCard=null;selectedPlayerId=null;
                    fetchState();
                } else toast(d.error,'error');
            } catch(e){toast('Ошибка','error');}
        }
        function checkWin() {
            if(!state)return;
            const allCollected=state.players.reduce((s,p)=>s+p.quartets.length,0);
            if(allCollected>=state.categories.length||(state.bankCount===0&&state.players.every(p=>p.handCount===0))){
                clearInterval(pollTimer);
                document.getElementById('bottom-panel').classList.add('hidden');
                const sorted=[...state.players].sort((a,b)=>b.quartets.length-a.quartets.length);
                document.getElementById('app').innerHTML=`<div class="header"><h1 style="font-family:'Playfair Display',serif;font-size:22px;">🏆 Игра окончена!</h1><div class="decor-line"></div></div>`+sorted.map((p,i)=>`<div class="score-item ${i===0&&sorted[0].quartets.length>0?'winner':''}"><span>${i===0?'👑 ':''}${p.name}</span><span style="color:var(--accent);font-weight:bold;">${p.quartets.length} квартетов</span></div>`).join('')+'<button class="btn btn-primary btn-full" onclick="showMenu()">В меню</button>';
            }
        }
        showMenu();
    </script>
</body>
</html>
