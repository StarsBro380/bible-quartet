<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #f5f0e8; --card: #fffef9; --accent: #7b4b2a; --accent2: #5b3ec9;
            --text: #1a0f08; --text2: #8a7568; --green: #27ae60; --red: #c0392b;
            --border: #e0d5c5; --gold: #7b4b2a; --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 12px; padding-bottom: 140px;
            -webkit-tap-highlight-color: transparent; user-select: none;
            font-size: 14px; line-height: 1.5;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header { text-align: center; padding: 16px 0 12px; }
        .header h1 { font-size: 22px; color: var(--accent); font-weight: bold; }
        .header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
        .btn {
            display: inline-block; padding: 14px 22px; font-size: 15px; font-weight: 600;
            border: none; border-radius: 10px; cursor: pointer; margin: 5px;
            font-family: inherit; transition: all 0.2s; text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #7b4b2a; color: #fff; }
        .btn-secondary { background: #fff; color: var(--text); border: 2px solid #d5c8b5; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-full { width: 100%; display: block; }
        .btn-small { padding: 8px 14px; font-size: 12px; }
        .input {
            width: 100%; padding: 14px 18px; font-size: 16px; text-align: center;
            border: 2px solid #d5c8b5; border-radius: 10px; background: #fff;
            font-family: inherit; letter-spacing: 4px; font-weight: bold;
            text-transform: uppercase; color: var(--accent);
        }
        .input:focus { outline: none; border-color: var(--accent); }
        .toast {
            position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
            background: #fff; border: 2px solid var(--accent);
            color: var(--text); padding: 12px 20px; border-radius: 12px;
            font-size: 13px; z-index: 100; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; max-width: 90%; text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .toast.show { opacity: 1; }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; background: var(--card); border-radius: 12px;
            margin: 10px 0; font-size: 14px; border: 2px solid var(--border);
            box-shadow: var(--shadow);
        }
        .info-bar .turn { color: var(--accent); font-weight: bold; font-size: 15px; }
        .info-bar .score { color: var(--text2); font-size: 13px; }
        .cat-section { margin: 6px 0; }
        .cat-header {
            background: var(--accent); color: #fff;
            border: none; border-radius: 10px 10px 0 0;
            padding: 12px 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; box-shadow: 0 2px 8px rgba(123,75,42,0.2);
        }
        .cat-header:active { opacity: 0.9; }
        .cat-header .title { font-weight: bold; color: #fff; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
        .cat-header .badge { font-size: 12px; padding: 4px 12px; border-radius: 14px; font-weight: bold; }
        .badge-full { background: #fff; color: #1e8449; }
        .badge-partial { background: rgba(255,255,255,0.2); color: #fff; }
        .cat-header .arrow { font-size: 12px; transition: transform 0.3s; color: rgba(255,255,255,0.7); }
        .cat-header .arrow.open { transform: rotate(180deg); }
        .cards-row {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 10px;
            background: #faf7f2; border: 2px solid var(--border); border-top: none;
            border-radius: 0 0 10px 10px;
        }
        .cards-row.collapsed { display: none; }
        .card-chip {
            background: #fff; border: 2px solid #e0d5c5;
            border-radius: 10px; padding: 12px 10px; cursor: pointer;
            font-size: 13px; text-align: center;
            flex: 1 1 calc(50% - 6px); min-width: 90px; max-width: calc(50% - 6px);
            position: relative; color: var(--text);
            box-shadow: 0 2px 6px rgba(0,0,0,0.06); transition: all 0.2s;
        }
        .card-chip.owned { border-color: #27ae60; background: #eafaf1; cursor: default; }
        .card-chip.missing { opacity: 0.45; border-style: dashed; background: #fafafa; }
        .card-chip.missing:active { opacity: 0.9; border-color: var(--accent2); background: #f5f0ff; }
        .card-chip.selected {
            border-color: #5b3ec9 !important;
            background: #f0ebff !important;
            box-shadow: 0 0 20px rgba(91,62,201,0.3);
            opacity: 1 !important; transform: scale(1.04); z-index: 5;
        }
        .card-chip .chip-name { font-size: 12px; line-height: 1.4; font-weight: 500; }
        .card-chip .chip-player { font-size: 9px; color: var(--accent); margin-top: 2px; }
        .hidden { display: none !important; }
        .player-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .player-card {
            background: #fff; border: 2px solid #e0d5c5; border-radius: 12px;
            padding: 12px; flex: 1 1 calc(50% - 8px); min-width: 120px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        .player-card:hover, .player-card:active { border-color: var(--accent2); background: #faf7ff; }
        .player-card.current { border-color: var(--accent); background: #fdf5ec; }
        .player-card .p-name { font-weight: bold; font-size: 14px; color: var(--accent); }
        .player-card .p-info { font-size: 11px; color: var(--text2); margin-top: 4px; }
        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fffef9; border-top: 2px solid #e8dccf;
            z-index: 50; padding: 8px 10px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 -3px 14px rgba(0,0,0,0.06);
        }
        .history-row {
            display: flex; gap: 7px; overflow-x: auto; padding: 4px 0;
            white-space: nowrap; height: 32px; align-items: center; margin-bottom: 6px;
        }
        .history-row::-webkit-scrollbar { display: none; }
        .history-row .h-item {
            flex-shrink: 0; font-size: 10px; padding: 4px 10px;
            background: #f5f0e8; border-radius: 8px;
            color: var(--text2); max-width: 160px;
            overflow: hidden; text-overflow: ellipsis;
        }
        .history-row .h-item.ok { border-left: 3px solid var(--green); }
        .history-row .h-item.no { border-left: 3px solid var(--red); }
        .action-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .action-row .btn { flex: 1; min-width: 110px; padding: 12px; font-size: 13px; }
        .code-display {
            text-align: center; padding: 20px; background: #fff; border-radius: 12px;
            border: 2px dashed var(--accent); margin: 16px 0;
        }
        .code-display .code { font-size: 36px; font-weight: bold; color: var(--accent); letter-spacing: 8px; }
        .code-display .waiting { color: var(--text2); font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container" id="app"></div>
    <div class="bottom-panel hidden" id="bottom-panel">
        <div class="history-row" id="history-row"></div>
        <div class="action-row" id="action-row"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor('#f5f0e8'); tg.setBackgroundColor('#f5f0e8'); }
        
        const API = 'https://YOUR_RENDER_URL.onrender.com';
        let state = null, playerId = null, roomCode = null, selectedCard = null, moveHistory = [];
        let playerName = tg?.initDataUnsafe?.user?.first_name || 'Игрок';
        let pollTimer = null;

        function toast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
            clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
        }
        function addHistory(icon, text, type) {
            moveHistory.unshift({ icon, text, type }); if (moveHistory.length > 30) moveHistory.pop(); renderHistory();
        }
        function renderHistory() {
            document.getElementById('history-row').innerHTML = moveHistory.slice(0, 8).map(h => `<div class="h-item ${h.type}">${h.icon} ${h.text}</div>`).join('');
        }
        function renderActions() {
            const row = document.getElementById('action-row');
            if (!state || state.currentPlayer !== playerId) { row.innerHTML = ''; return; }
            if (selectedCard) {
                row.innerHTML = `<button class="btn btn-primary" onclick="requestCard()">❓ Просить "${selectedCard.cardName}"</button>`;
            } else {
                row.innerHTML = '<span style="color:var(--text2);font-size:12px;">👆 Выберите карточку и игрока</span>';
            }
        }

        // МЕНЮ
        function showMenu() {
            clearInterval(pollTimer);
            document.getElementById('bottom-panel').classList.add('hidden');
            document.getElementById('app').innerHTML = `
                <div class="header"><h1>📖 Библейский квартет</h1><p>37 категорий · 148 карточек</p></div>
                <button class="btn btn-primary btn-full" onclick="showCreate()">🎮 Создать игру</button>
                <button class="btn btn-secondary btn-full" onclick="showJoin()">🔗 Присоединиться</button>`;
        }

        function showCreate() {
            document.getElementById('app').innerHTML = `
                <div class="header"><h2>Создание игры</h2></div>
                <p style="text-align:center;color:var(--text2);margin-bottom:12px;">Сколько карт раздать?</p>
                <button class="btn btn-primary btn-full" onclick="createGame(7)">7 карт</button>
                <button class="btn btn-primary btn-full" onclick="createGame(10)">10 карт</button>
                <button class="btn btn-primary btn-full" onclick="createGame(15)">15 карт</button>
                <button class="btn btn-secondary btn-full" onclick="showMenu()">← Назад</button>`;
        }

        function showJoin() {
            document.getElementById('app').innerHTML = `
                <div class="header"><h2>Подключение</h2></div>
                <p style="text-align:center;color:var(--text2);margin-bottom:12px;">Введите код комнаты</p>
                <input class="input" id="join-code" placeholder="ABC123" maxlength="6">
                <button class="btn btn-primary btn-full" onclick="joinGame()">🔗 Присоединиться</button>
                <button class="btn btn-secondary btn-full" onclick="showMenu()">← Назад</button>`;
        }

        async function createGame(n) {
            try {
                const r = await fetch(API + '/create', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:playerName, cards:n}) });
                const d = await r.json();
                if (d.ok) { roomCode = d.code; playerId = d.playerId; showLobby(); }
                else toast(d.error, 'error');
            } catch(e) { toast('Ошибка соединения', 'error'); }
        }

        async function joinGame() {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (!code) { toast('Введите код', 'error'); return; }
            try {
                const r = await fetch(API + '/join', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code, name:playerName}) });
                const d = await r.json();
                if (d.ok) { roomCode = code; playerId = d.playerId; startPolling(); }
                else toast(d.error, 'error');
            } catch(e) { toast('Ошибка соединения', 'error'); }
        }

        function showLobby() {
            document.getElementById('app').innerHTML = `
                <div class="code-display">
                    <p style="color:var(--text2);">Код комнаты:</p>
                    <div class="code">${roomCode}</div>
                    <p class="waiting">⏳ Ожидание игроков...</p>
                </div>
                <button class="btn btn-secondary btn-full" onclick="startPolling()">🎮 Начать игру (2+ игроков)</button>
                <button class="btn btn-secondary btn-full" onclick="showMenu()">← Отмена</button>`;
        }

        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(fetchState, 2000);
            fetchState();
        }

        async function fetchState() {
            if (!roomCode || playerId === null) return;
            try {
                const r = await fetch(`${API}/state/${roomCode}/${playerId}`);
                const d = await r.json();
                if (d.ok) { state = d; renderGame(); }
            } catch(e) {}
        }

        function renderGame() {
            if (!state || state.status === 'waiting') { showLobby(); return; }
            document.getElementById('bottom-panel').classList.remove('hidden');
            const me = state.players.find(p => p.id === playerId);
            
            let html = `<div class="info-bar"><span class="turn">${state.currentPlayer === playerId ? '🎯 Ваш ход' : '⏳ Ход игрока: ' + state.players[state.currentPlayer].name}</span><span class="score">🏆 ${me.quartets.length} квартетов | Запас: ${state.bankCount}</span></div>`;
            
            // Список игроков
            html += '<div class="player-list">';
            for (const p of state.players) {
                if (p.id === playerId) continue;
                const isCur = state.currentPlayer === p.id;
                html += `<div class="player-card ${isCur ? 'current' : ''}" onclick="selectPlayer(${p.id})"><div class="p-name">${p.name}</div><div class="p-info">🃏 ${p.handCount} карт | 🏆 ${p.quartets.length} квартетов</div></div>`;
            }
            html += '</div>';

            // Карты игрока
            const grouped = {};
            if (me.hand) me.hand.forEach(c => { if (!grouped[c.category]) grouped[c.category] = []; grouped[c.category].push(c); });
            const allCats = {};
            state.categories.forEach(q => { allCats[q.name] = q.cards.map(c => ({ name: c.name, category: q.name, owned: me.hand ? me.hand.some(h => h.category === q.name && h.cardName === c.name) : false })); });
            const active = Object.keys(grouped).sort();
            
            if (!active.length) html += '<p style="text-align:center;padding:40px;color:var(--text2)">У вас нет карт</p>';
            else {
                html += active.map(cat => {
                    const cards = allCats[cat] || [], cnt = grouped[cat].length, done = cnt === 4;
                    const catId = cat.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_');
                    return `<div class="cat-section"><div class="cat-header" onclick="toggleCat('${catId}')"><span class="title">${cat}</span><span class="badge ${done ? 'badge-full' : 'badge-partial'}">${cnt}/4${done ? ' ✅' : ''}</span><span class="arrow" id="arrow-${catId}">▼</span></div><div class="cards-row" id="row-${catId}">${cards.map(c => { const o = c.owned; const s = selectedCard && selectedCard.category === cat && selectedCard.cardName === c.name; return o ? `<div class="card-chip owned"><div class="chip-name">✅ ${c.name}</div></div>` : `<div class="card-chip missing ${s ? 'selected' : ''}" onclick="selectCard('${cat.replace(/'/g, "\\'")}', '${c.name.replace(/'/g, "\\'")}')"><div class="chip-name">🃏 ${c.name}</div></div>`; }).join('')}</div></div>`;
                }).join('');
            }

            document.getElementById('app').innerHTML = html;
            renderActions();
            checkWin();
        }

        function toggleCat(id) { document.getElementById('row-' + id).classList.toggle('collapsed'); document.getElementById('arrow-' + id).classList.toggle('open'); }
        
        let selectedPlayerId = null;
        function selectPlayer(pid) {
            selectedPlayerId = pid;
            toast(`Выбран игрок: ${state.players[pid].name}`, '');
        }
        function selectCard(cat, name) {
            if (state.currentPlayer !== playerId) return;
            selectedCard = (selectedCard && selectedCard.category === cat && selectedCard.cardName === name) ? null : { category: cat, cardName: name };
            renderGame();
        }

        async function requestCard() {
            if (!selectedCard) { toast('⚠️ Выберите карточку!', 'error'); return; }
            if (!selectedPlayerId && state.players.length > 2) { toast('⚠️ Выберите игрока!', 'error'); return; }
            
            const toPlayer = selectedPlayerId !== null ? selectedPlayerId : (playerId === 0 ? 1 : 0);
            
            try {
                const r = await fetch(API + '/request', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({code:roomCode, fromPlayer:playerId, toPlayer, category:selectedCard.category, cardName:selectedCard.cardName})
                });
                const d = await r.json();
                if (d.ok) {
                    if (d.found) {
                        toast(`✅ Получили "${d.card.cardName}"!`, 'success');
                        addHistory('✅', `Вы: "${d.card.cardName}"`, 'ok');
                    } else {
                        toast(d.drawn ? '❌ Не угадали. Запас.' : '❌ Не угадали. Пусто.', 'error');
                        addHistory('📦', `Нет "${selectedCard.cardName}"`, 'no');
                    }
                    selectedCard = null; selectedPlayerId = null;
                    fetchState();
                } else toast(d.error, 'error');
            } catch(e) { toast('Ошибка', 'error'); }
        }

        function checkWin() {
            if (!state) return;
            const total = state.categories.length;
            const allCollected = state.players.reduce((s, p) => s + p.quartets.length, 0);
            if (allCollected >= total || (state.bankCount === 0 && state.players.every(p => p.handCount === 0))) {
                clearInterval(pollTimer);
                document.getElementById('bottom-panel').classList.add('hidden');
                const sorted = [...state.players].sort((a, b) => b.quartets.length - a.quartets.length);
                document.getElementById('app').innerHTML = `<div class="header"><h1>🏆 Игра окончена!</h1></div>` + sorted.map((p, i) => `<div class="score-item ${i === 0 && sorted[0].quartets.length > 0 ? 'winner' : ''}"><span>${i === 0 && sorted[0].quartets.length > 0 ? '👑 ' : ''}${p.name}</span><span style="color:var(--accent);font-weight:bold;">${p.quartets.length} квартетов</span></div>`).join('') + '<button class="btn btn-primary btn-full" onclick="showMenu()">В меню</button>';
            }
        }

        showMenu();
    </script>
</body>
</html>
