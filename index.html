<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d1a; --card: #1a1a35; --accent: #e2a03f; --accent2: #7c3aed;
            --text: #f1f5f9; --text2: #94a3b8; --green: #10b981; --red: #ef4444; --border: #2d2d4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif; background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 10px; padding-bottom: 130px;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header { text-align: center; padding: 6px 0 10px; }
        .header h1 { font-size: 18px; }
        .header p { font-size: 11px; }
        .btn {
            width: 100%; padding: 13px; font-size: 14px; font-weight: 600;
            border: none; border-radius: 10px; cursor: pointer; margin: 4px 0;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: #fff; }

        /* FAB */
        .fab {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: var(--accent2); color: #fff;
            padding: 13px 22px; border-radius: 14px;
            font-weight: bold; font-size: 13px; cursor: pointer;
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.5);
            z-index: 50; transition: all 0.2s; border: none;
            display: none; white-space: nowrap;
        }
        .fab.visible { display: block; }
        .fab:active { transform: translateX(-50%) scale(0.95); }

        /* TOAST */
        .toast {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: var(--card); border: 1px solid var(--accent);
            color: var(--text); padding: 8px 14px; border-radius: 10px;
            font-size: 11px; z-index: 60; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; max-width: 90%; text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .toast.show { opacity: 1; }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }

        /* КАТЕГОРИИ */
        .cat-header {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 10px; margin: 5px 0 0;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: all 0.2s; font-size: 12px;
        }
        .cat-header .title { font-weight: bold; color: var(--accent); font-size: 11px; text-transform: uppercase; }
        .cat-header .info { display: flex; gap: 8px; align-items: center; }
        .cat-header .count { font-size: 10px; padding: 2px 7px; border-radius: 5px; }
        .count-full { background: var(--green); color: #fff; }
        .count-partial { background: rgba(226,160,63,0.2); color: var(--accent); }
        .cat-header .arrow { font-size: 12px; transition: transform 0.3s; }
        .cat-header .arrow.open { transform: rotate(180deg); }

        /* КАРТОЧКИ */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 3px; padding: 3px 0 0;
        }
        .cards-grid.collapsed { display: none; }

        .card-cell {
            background: var(--card); border: 2px solid var(--border);
            border-radius: 6px; overflow: hidden; cursor: pointer;
            transition: all 0.2s; position: relative;
            max-width: 130px; margin: 0 auto;
            aspect-ratio: 2.5/3.5;
        }
        .card-cell.owned { border-color: var(--green); cursor: default; }
        .card-cell.missing { opacity: 0.4; filter: grayscale(0.5); }
        .card-cell.missing:active { opacity: 0.8; filter: grayscale(0.2); border-color: var(--accent2); }
        .card-cell.selected {
            border-color: var(--accent2) !important;
            box-shadow: 0 0 14px rgba(124, 58, 237, 0.6);
            opacity: 1 !important; filter: none !important; transform: scale(1.03);
        }
        .card-cell.selected::after {
            content: '✅'; position: absolute; top: 3px; right: 3px;
            font-size: 11px; z-index: 5; background: var(--accent2);
            border-radius: 50%; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .card-cell img { width: 100%; height: 100%; object-fit: cover; }
        .card-cell .label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8); padding: 1px 2px;
            font-size: 7px; text-align: center; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .hidden { display: none !important; }
        .score-item { background: var(--card); border-radius: 8px; padding: 8px; margin: 5px 0; display: flex; justify-content: space-between; font-size: 12px; }

        /* ИСТОРИЯ */
        .history-bar {
            position: fixed; bottom: 55px; left: 4px; right: 4px;
            height: 45px; overflow-x: auto; overflow-y: hidden;
            white-space: nowrap; z-index: 30;
            display: flex; gap: 3px; padding: 2px 0; align-items: center;
        }
        .history-item {
            flex-shrink: 0; background: var(--card); border-radius: 6px;
            padding: 3px 6px; font-size: 9px; display: flex; align-items: center; gap: 3px;
        }
        .history-item .icon { font-size: 10px; }
        .history-item .text { color: var(--text2); }
        .history-item .text b { color: var(--accent); }
        .history-item.success { border-bottom: 2px solid var(--green); }
        .history-item.fail { border-bottom: 2px solid var(--red); }
        .history-item.neutral { border-bottom: 2px solid var(--accent2); }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <button class="fab" id="fab" onclick="requestSelected()">❓ Запросить</button>
    <div class="history-bar" id="history-bar"></div>

    <div class="container">
        <div id="main-menu">
            <div class="header"><h1>📖 Библейский квартет</h1><p style="color:var(--text2)">37 квартетов · 148 карт</p></div>
            <button class="btn btn-primary" onclick="showCardCountChoice()">🎮 Играть с ботом</button>
        </div>
        <div id="card-count-screen" class="hidden">
            <div class="header"><h2>🃏 Сколько карт раздать?</h2></div>
            <button class="btn btn-primary" onclick="startGame(7)">7 карт</button>
            <button class="btn btn-primary" onclick="startGame(10)">10 карт</button>
            <button class="btn btn-primary" onclick="startGame(15)">15 карт</button>
            <button class="btn btn-secondary" onclick="showMainMenu()">← Назад</button>
        </div>
        <div id="game-screen" class="hidden">
            <div class="header"><h2 id="game-status" style="color:var(--accent);font-size:16px;"></h2><p style="color:var(--text2);font-size:11px;" id="turn-info"></p></div>
            <div id="play-area"></div>
            <button class="btn btn-danger hidden" id="end-btn" onclick="endTurn()" style="margin-bottom:70px;">✅ Закончить ход</button>
        </div>
        <div id="win-screen" class="hidden">
            <div class="header"><h1>🏆 Игра окончена!</h1><div class="scoreboard" id="scoreboard"></div><button class="btn btn-primary" onclick="showMainMenu()">В меню</button></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor('#0d0d1a'); tg.setBackgroundColor('#0d0d1a'); }
        let gameState = null, playerName = 'Игрок', selectedCard = null, moveHistory = [];
        if (tg?.initDataUnsafe?.user) playerName = tg.initDataUnsafe.user.first_name || 'Игрок';

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + (type || '') + ' show';
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
        }

        function addHistory(icon, text, type) {
            moveHistory.unshift({ icon, text, type });
            if (moveHistory.length > 20) moveHistory.pop();
            renderHistory();
        }

        function renderHistory() {
            document.getElementById('history-bar').innerHTML = moveHistory.slice(0, 10).map(h => 
                `<div class="history-item ${h.type}"><span class="icon">${h.icon}</span><span class="text">${h.text}</span></div>`
            ).join('');
        }

        function updateFab() {
            const fab = document.getElementById('fab');
            if (selectedCard && gameState && gameState.currentPlayer === 0) {
                fab.classList.add('visible');
                fab.textContent = `❓ Запросить "${selectedCard.cardName}"`;
            } else { fab.classList.remove('visible'); }
        }

        async function loadData() { const r = await fetch('data.json'); return await r.json(); }
        function showMainMenu() { document.querySelectorAll('#main-menu, #card-count-screen, #game-screen, #win-screen').forEach(e => e.classList.add('hidden')); document.getElementById('main-menu').classList.remove('hidden'); }
        function showCardCountChoice() { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('card-count-screen').classList.remove('hidden'); }

        async function startGame(n) {
            const data = await loadData();
            if (!data.length) return alert('Ошибка');
            let deck = [];
            data.forEach(q => q.cards.forEach(c => deck.push({ category: q.name, categoryId: q.id, cardName: c.name, image: c.image })));
            deck = shuffle(deck);
            gameState = { players: [{ id: 0, name: playerName, hand: deck.splice(0, n), quartets: [] }, { id: 1, name: 'Бот', hand: deck.splice(0, n), quartets: [] }], bank: deck, currentPlayer: 0, data: data };
            moveHistory = []; renderHistory();
            document.getElementById('card-count-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showToast('🎮 Игра началась! Выберите тусклую карту.', '');
            addHistory('🎮', 'Игра началась!', 'neutral');
            updateUI();
        }

        function updateUI() {
            const me = gameState.players[0];
            document.getElementById('game-status').textContent = gameState.currentPlayer === 0 ? '🎯 Ваш ход' : '⏳ Бот думает...';
            document.getElementById('turn-info').textContent = `🏆 Вы: ${me.quartets.length} | Бот: ${gameState.players[1].quartets.length}`;
            if (gameState.currentPlayer === 0) {
                document.getElementById('end-btn').classList.remove('hidden');
            } else {
                document.getElementById('end-btn').classList.add('hidden');
                setTimeout(botTurn, 1200);
            }
            renderPlayArea(); updateFab(); checkWin();
        }

        function renderPlayArea() {
            const me = gameState.players[0], container = document.getElementById('play-area');
            const grouped = {};
            me.hand.forEach(c => { if (!grouped[c.category]) grouped[c.category] = []; grouped[c.category].push(c); });
            const allGrouped = {};
            gameState.data.forEach(q => { allGrouped[q.name] = q.cards.map(c => ({ ...c, category: q.name, owned: me.hand.some(h => h.category === q.name && h.cardName === c.name) })); });
            const active = Object.keys(grouped).sort();
            if (!active.length) { container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text2)">У вас нет карт</p>'; return; }

            container.innerHTML = active.map(cat => {
                const cards = allGrouped[cat] || [], cnt = grouped[cat].length, done = cnt === 4;
                const catId = cat.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_');
                return `<div class="cat-header" onclick="toggleCategory('${catId}')"><span class="title">${cat}</span><div class="info"><span class="count ${done ? 'count-full' : 'count-partial'}">${cnt}/4${done ? ' ✅' : ''}</span><span class="arrow" id="arrow-${catId}">▼</span></div></div><div class="cards-grid" id="grid-${catId}">${cards.map(c => { const isOwned = c.owned; const isSel = selectedCard && selectedCard.category === cat && selectedCard.cardName === c.name; if (isOwned) return `<div class="card-cell owned"><img src="${c.image}" alt=""><div class="label">✅ ${c.name}</div></div>`; return `<div class="card-cell missing ${isSel ? 'selected' : ''}" onclick="selectCard('${cat.replace(/'/g, "\\'")}', '${c.name.replace(/'/g, "\\'")}')"><img src="${c.image}" alt=""><div class="label">❓ ${c.name}</div></div>`; }).join('')}</div>`;
            }).join('');
        }

        function toggleCategory(catId) {
            document.getElementById('grid-' + catId).classList.toggle('collapsed');
            document.getElementById('arrow-' + catId).classList.toggle('open');
        }

        function selectCard(cat, name) {
            if (gameState.currentPlayer !== 0) return;
            if (selectedCard && selectedCard.category === cat && selectedCard.cardName === name) { selectedCard = null; }
            else { selectedCard = { category: cat, cardName: name }; }
            renderPlayArea(); updateFab();
        }

        function requestSelected() {
            if (!selectedCard) { showToast('⚠️ Сначала выберите карту!', 'error'); return; }
            const me = gameState.players[0], bot = gameState.players[1];
            const idx = bot.hand.findIndex(c => c.category === selectedCard.category && c.cardName === selectedCard.cardName);
            if (idx !== -1) {
                me.hand.push(bot.hand.splice(idx, 1)[0]);
                showToast(`✅ Вы забрали "${selectedCard.cardName}"!`, 'success');
                addHistory('🎯', `Вы забрали <b>${selectedCard.cardName}</b>`, 'success');
                checkQuartets();
            } else {
                if (gameState.bank.length) {
                    me.hand.push(gameState.bank.pop());
                    showToast(`❌ У бота нет "${selectedCard.cardName}". Взяли из банка.`, 'error');
                    addHistory('📦', `Нет <b>${selectedCard.cardName}</b>. Взяли из банка`, 'fail');
                } else {
                    showToast(`❌ У бота нет "${selectedCard.cardName}". Банк пуст.`, 'error');
                    addHistory('🚫', `Нет <b>${selectedCard.cardName}</b>. Банк пуст`, 'fail');
                }
                gameState.currentPlayer = 1;
            }
            selectedCard = null; updateUI();
        }

        function endTurn() { selectedCard = null; gameState.currentPlayer = 1; updateUI(); }

        function botTurn() {
            if (gameState.currentPlayer !== 1) return;
            const bot = gameState.players[1];
            if (!bot.hand.length) { gameState.currentPlayer = 0; updateUI(); return; }
            const card = bot.hand[Math.floor(Math.random() * bot.hand.length)];
            const idx = gameState.players[0].hand.findIndex(c => c.category === card.category && c.cardName === card.cardName);
            if (idx !== -1) {
                bot.hand.push(gameState.players[0].hand.splice(idx, 1)[0]);
                showToast(`😈 Бот забрал у вас "${card.cardName}"!`, 'error');
                addHistory('👾', `Бот забрал <b>${card.cardName}</b>`, 'fail');
                checkQuartets();
            } else {
                if (gameState.bank.length) { bot.hand.push(gameState.bank.pop()); addHistory('📦', `Бот искал <b>${card.cardName}</b>. Взял из банка`, 'neutral'); }
                else { addHistory('🚫', `Бот искал <b>${card.cardName}</b>. Банк пуст`, 'neutral'); }
            }
            gameState.currentPlayer = 0; updateUI();
        }

        function checkQuartets() {
            [0, 1].forEach(pid => {
                const p = gameState.players[pid], g = {};
                p.hand.forEach(c => { if (!g[c.category]) g[c.category] = []; g[c.category].push(c); });
                Object.entries(g).forEach(([cat, cards]) => {
                    if (cards.length === 4) {
                        p.quartets.push(cat);
                        p.hand = p.hand.filter(c => c.category !== cat);
                        showToast(`🏆 ${p.name} собрал квартет "${cat}"!`, 'success');
                        addHistory('🏆', `<b>${p.name}</b> собрал «${cat}»`, 'success');
                    }
                });
            });
        }

        function checkWin() {
            const t = gameState.data.length, p1 = gameState.players[0].quartets.length, p2 = gameState.players[1].quartets.length;
            if (p1 + p2 >= t || (!gameState.bank.length && !gameState.players[0].hand.length && !gameState.players[1].hand.length)) endGame();
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('win-screen').classList.remove('hidden');
            document.getElementById('scoreboard').innerHTML = gameState.players.sort((a, b) => b.quartets.length - a.quartets.length).map(p => `<div class="score-item"><span>${p.quartets.length >= Math.max(...gameState.players.map(x => x.quartets.length)) ? '👑 ' : ''}${p.name}</span><span style="color:var(--accent)">${p.quartets.length} квартетов</span></div>`).join('');
        }

        function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

        showMainMenu();
    </script>
</body>
</html>
