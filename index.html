<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f0e8; --card: #fffef9; --accent: #7b4b2a; --accent2: #5b3ec9;
            --text: #1a0f08; --text2: #8a7568; --green: #27ae60; --red: #c0392b;
            --border: #e0d5c5; --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --history-bg: #a09080;
            --gradient: linear-gradient(135deg, #f5f0e8 0%, #e8ddd0 100%);
            --glass: rgba(255, 255, 255, 0.6);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --shadow-xl: 0 12px 48px rgba(0,0,0,0.15);
            --gold: linear-gradient(135deg, #8B5A2B 0%, #D4A76A 50%, #8B5A2B 100%);
            --chat-bg: #e8ddd0;
            --chat-received: #fff;
            --chat-sent: #dcf8c6;
            --chat-time: #8a7568;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background: var(--gradient);
            color: var(--text);
            min-height: 100vh; padding: 12px; padding-bottom: 160px;
            -webkit-tap-highlight-color: transparent; user-select: none;
            font-size: 14px; line-height: 1.5;
        }
        .container { max-width: 100%; margin: 0 auto; }
        .header { text-align: center; padding: 6px 0 4px; }
        .btn {
            display: inline-block; padding: 12px 20px; font-size: 15px; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer; margin: 4px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            transform: scale(1);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 24px rgba(123, 75, 42, 0.2);
        }
        .btn:active {
            transform: scale(0.96) !important;
            transition-duration: 0.1s !important;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:active::after {
            width: 300px;
            height: 300px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8B5A2B 0%, #6B3A1B 100%);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #9A6A3B 0%, #7B4A2B 100%);
            box-shadow: 0 8px 24px rgba(123, 75, 42, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text);
            border: 2px solid #d5c8b5;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.95);
            border-color: #7b4b2a;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        .btn-full { width: 100%; display: block; }
        .input {
            width: 100%; padding: 10px 14px; font-size: 15px;
            border: 2px solid #d5c8b5; border-radius: 10px; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-family: 'Inter', sans-serif;
            color: var(--accent);
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .input:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(123,75,42,0.1);
            background: rgba(255, 255, 255, 0.9);
        }
        .input-code { text-align: center; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; }
        .input-name { text-align: left; letter-spacing: 0; font-weight: normal; text-transform: none; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--accent);
            color: var(--text); padding: 14px 24px; border-radius: 14px;
            font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; max-width: 90%; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            font-weight: 500;
            transform: translateX(-50%) translateY(-20px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 14px;
            margin: 8px 0; font-size: 14px; border: 2px solid #d5c8b5; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .info-bar .turn { 
            color: var(--accent); 
            font-weight: 700; 
            font-size: 15px; 
            letter-spacing: 0.5px;
        }
        .info-bar .score { 
            color: var(--text2); 
            font-size: 13px; 
            background: rgba(123,75,42,0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .cat-section { margin: 6px 0; }
        .cat-header {
            background: linear-gradient(135deg, #7b4b2a 0%, #8a5530 100%);
            color: #fff;
            border: none; border-radius: 12px 12px 0 0;
            padding: 10px 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; box-shadow: 0 2px 8px rgba(123,75,42,0.2);
        }
        .cat-header .title { 
            font-weight: 700; 
            color: #fff; 
            font-size: 13px; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
        }
        .cat-header .badge { 
            font-size: 12px; 
            padding: 4px 14px; 
            border-radius: 20px; 
            font-weight: 700; 
        }
        .badge-full { 
            background: rgba(255,255,255,0.2); 
            color: #fff; 
            backdrop-filter: blur(4px); 
        }
        .badge-partial { 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            backdrop-filter: blur(4px); 
        }
        .cat-header .arrow { font-size: 12px; transition: transform 0.3s; }
        .cat-header .arrow.open { transform: rotate(180deg); }
        .cards-row {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 10px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #d5c8b5; border-top: none;
            border-radius: 0 0 12px 12px;
        }
        .cards-row.collapsed { display: none; }
        .card-chip {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #d5c8b5;
            border-radius: 10px; padding: 10px 10px; cursor: pointer;
            font-size: 13px; text-align: center;
            flex: 1 1 calc(50% - 6px); min-width: 80px; max-width: calc(50% - 6px);
            position: relative; color: var(--text);
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-chip.owned { 
            border-color: #27ae60; 
            background: rgba(39, 174, 96, 0.08); 
            cursor: default; 
            border-width: 2px;
        }
        .card-chip.missing { 
            opacity: 0.7; 
            border-style: dashed; 
            background: rgba(250, 250, 250, 0.5); 
        }
        .card-chip.missing:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(91, 62, 201, 0.12);
            opacity: 1;
        }
        .card-chip.selected {
            border-color: #5b3ec9 !important; 
            background: rgba(91, 62, 201, 0.08) !important;
            box-shadow: 0 0 24px rgba(91,62,201,0.15);
            opacity: 1 !important; 
            transform: scale(1.08) !important;
            animation: pulse 0.5s ease-in-out;
        }
        .card-chip .chip-name { font-size: 12px; line-height: 1.4; font-weight: 500; }
        @keyframes pulse {
            0%, 100% { transform: scale(1.08); }
            50% { transform: scale(1.12); }
        }
        .hidden { display: none !important; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .player-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid #d5c8b5; border-radius: 12px;
            padding: 10px; flex: 1 1 calc(50% - 6px); min-width: 100px;
            text-align: center; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .player-card:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .player-card:active { border-color: var(--accent2); background: rgba(91,62,201,0.05); }
        .player-card.current {
            border-color: var(--accent);
            background: rgba(123, 75, 42, 0.06);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 6px rgba(123, 75, 42, 0.1); }
            to { box-shadow: 0 0 20px rgba(123, 75, 42, 0.2); }
        }
        .player-card.selected-player { border: 3px solid #5b3ec9; background: rgba(91,62,201,0.08); }
        .player-card .p-name { 
            font-weight: 700; 
            font-size: 14px; 
            color: var(--accent); 
            font-family: 'Playfair Display', serif; 
        }
        .player-card .p-info { font-size: 11px; color: var(--text2); margin-top: 3px; }
        .score-item {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 12px; padding: 12px 16px;
            margin: 6px 0; display: flex; justify-content: space-between;
            font-size: 15px; border: 2px solid #d5c8b5; box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .winner { 
            border-color: var(--accent); 
            background: rgba(123,75,42,0.05); 
            border-width: 2px;
        }
        .bottom-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 2px solid #d5c8b5;
            z-index: 50; padding: 8px 10px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 32px rgba(0,0,0,0.06);
        }
        .history-container {
            max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .history-container.open { max-height: 250px; overflow-y: auto; }
        .history-toggle {
            font-size: 12px; color: #fff; cursor: pointer;
            text-align: center; padding: 8px 0; user-select: none;
            background: linear-gradient(135deg, #7b4b2a 0%, #8a5530 100%);
            border-radius: 10px;
            margin: 0 0 4px 0; font-weight: 600;
            border: 1px solid #5a3518;
            box-shadow: 0 2px 8px rgba(123,75,42,0.2);
        }
        .history-item {
            font-size: 11px; padding: 6px 12px; margin: 2px 0;
            border-radius: 8px; display: flex; gap: 8px; align-items: flex-start;
        }
        .history-item.ok { background: rgba(39, 174, 96, 0.08); border-left: 3px solid var(--green); }
        .history-item.no { background: rgba(192, 57, 43, 0.08); border-left: 3px solid var(--red); }
        .history-item.system { background: rgba(123, 75, 42, 0.08); border-left: 3px solid var(--accent); }
        .history-item .h-time { color: var(--text2); white-space: nowrap; font-size: 10px; }
        .history-item .h-text { flex: 1; }
        .action-row { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }
        .action-row .btn { flex: 1; min-width: 80px; padding: 10px; font-size: 13px; }
        .code-display {
            text-align: center; padding: 12px; margin: 6px 0;
            position: relative;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .code-display:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .code-display .code { 
            font-family: 'Playfair Display', serif; 
            font-size: 32px; 
            font-weight: 700; 
            color: var(--accent); 
            letter-spacing: 8px; 
        }
        .code-display .copy-hint { color: var(--text2); font-size: 11px; margin-top: 6px; }
        .code-display .waiting { color: var(--text2); font-size: 11px; margin-top: 4px; }
        .players-waiting { margin: 6px 0; }
        .players-waiting .pw-item { 
            padding: 8px 14px; 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            border-radius: 10px; 
            margin: 3px 0; 
            border: 1px solid #d5c8b5;
            font-size: 14px; 
        }
        .name-section { margin-bottom: 4px; }
        .name-section label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 3px; font-weight: 500; }
        .container > * {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .decor-line {
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #7b4b2a, #8a5530);
            margin: 6px auto;
            border-radius: 3px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, #7b4b2a, #8a5530); 
            border-radius: 2px; 
        }

        /* Бегущая пунктирная рамка — чистая */
        .running-border {
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 14px;
            border: 2px dashed var(--accent);
            pointer-events: none;
            animation: dash-move 2s linear infinite;
            opacity: 0.8;
        }

        .code-display:hover .running-border {
            animation-direction: reverse;
            opacity: 1;
        }

        @keyframes dash-move {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }

        /* Панель игрока */
        .player-panel {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            background: linear-gradient(135deg, rgba(123,75,42,0.08), rgba(123,75,42,0.02));
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 14px;
            border: 2px solid #d5c8b5;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            margin: 3px 0;
            width: 100%;
            transition: all 0.3s;
        }

        .player-panel:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .player-panel:first-child {
            background: linear-gradient(135deg, rgba(123,75,42,0.15), rgba(123,75,42,0.05));
            border-color: var(--accent);
            border-width: 2px;
        }

        .player-avatar {
            font-size: 28px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f0e8, #e8ddd0);
            border-radius: 50%;
            border: 2px solid #d5c8b5;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .player-avatar.creator {
            background: linear-gradient(135deg, #7b4b2a, #8a5530);
            color: #fff;
            border-color: #7b4b2a;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .player-name {
            font-weight: 700;
            font-size: 16px;
            color: var(--accent);
            font-family: 'Playfair Display', serif;
        }

        .player-role {
            font-size: 12px;
            color: var(--text2);
            margin-top: 2px;
            font-weight: 500;
        }

        .player-role.creator-role {
            color: #7b4b2a;
            font-weight: 600;
        }

        /* Игроки, присоединившиеся позже */
        .player-panel:not(:first-child) {
            background: rgba(255, 255, 255, 0.6);
            border-style: dashed;
        }

        .player-panel:not(:first-child) .player-avatar {
            background: linear-gradient(135deg, #e8ddd0, #d5c8b5);
        }

        /* ===== УЛУЧШЕННЫЙ ЛОГОТИП (как на фото) ===== */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 4px 0;
            margin: 0 auto;
        }

        .logo-icon {
            font-size: 38px;
            color: #7b4b2a;
            line-height: 1;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06));
            flex-shrink: 0;
        }

        .logo-text-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
        }

        .logo-text-main {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #7b4b2a;
            letter-spacing: 0.3px;
        }

        .logo-text-sub {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: #8a7568;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        /* Улучшенный дизайн первой страницы */
        .menu-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px 16px 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }

        .menu-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(123,75,42,0.03), transparent 70%);
            animation: menu-shine 6s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes menu-shine {
            0% { transform: translate(-10%, -10%); opacity: 0.5; }
            100% { transform: translate(10%, 10%); opacity: 1; }
        }

        .menu-container .logo-container {
            position: relative;
            z-index: 1;
        }

        .menu-container .name-section {
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .menu-container .btn {
            width: 100%;
            max-width: 300px;
            position: relative;
            z-index: 1;
        }

        /* Декоративный элемент для первой страницы */
        .menu-decoration {
            position: absolute;
            bottom: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123,75,42,0.05), transparent 70%);
            pointer-events: none;
        }

        .menu-decoration-2 {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123,75,42,0.03), transparent 70%);
            pointer-events: none;
        }

        /* Анимированные иконки для кнопок */
        .btn-icon {
            display: inline-block;
            margin-right: 8px;
            animation: icon-bounce 2s ease-in-out infinite;
        }

        @keyframes icon-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        .btn-icon.join-icon {
            animation-delay: 0.3s;
        }

        /* ===== ЧАТ С ПОДДЕРЖКОЙ (как Telegram/WhatsApp) ===== */
        #chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }
        #chat-modal .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 0;
            max-width: 400px;
            width: 90%;
            height: 80vh;
            max-height: 600px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-modal .chat-header {

<body>
    <div class="toast" id="toast"></div>
    <div class="container" id="app"></div>
    <div class="bottom-panel hidden" id="bottom-panel">
        <div class="history-toggle" id="history-toggle" onclick="toggleHistory()">📜 История ▼</div>
        <div class="history-container" id="history-container">
            <div id="history-list"></div>
        </div>
        <div class="action-row" id="action-row"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); tg.setHeaderColor('#f5f0e8'); tg.setBackgroundColor('#f5f0e8'); }
        
        const API = 'https://bible-quartet-server.onrender.com';
        const ADMIN_IDS = [39444699];
        let state = null, playerId = null, roomCode = null, selectedCard = null, selectedPlayerId = null;
        let playerName = tg?.initDataUnsafe?.user?.first_name || '';
        let pollTimer = null, historyOpen = false;
        let feedbackOpen = false, rulesOpen = false, adminOpen = false;
        let isObserver = false;
        let chatModalOpen = false;
        let adminChatModalOpen = false;
        let adminTabs = {};

        // --- Хранилище сообщений для админа (клиентская часть) ---
        let adminMessages = {}; // { roomCode: [ {from, text, time, read} ] }
        let adminChats = {}; // { roomCode: { name: 'Игрок', lastMsg: '...', time: '...', unread: 0 } }

        function toast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + (type||'') + ' show';
            clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500);
        }
        function toggleHistory() {
            historyOpen = !historyOpen;
            const c = document.getElementById('history-container');
            const t = document.getElementById('history-toggle');
            if (historyOpen) { c.classList.add('open'); t.textContent = '📜 Свернуть ▲'; }
            else { c.classList.remove('open'); t.textContent = '📜 История ▼'; }
        }
        function renderHistory(history) {
            const list = document.getElementById('history-list');
            if (!history || !history.length) { list.innerHTML = '<div class="history-item system"><span class="h-text">История пуста</span></div>'; return; }
            list.innerHTML = history.slice().reverse().map(h => `<div class="history-item ${h.type||'system'}"><span class="h-time">${h.time}</span><span class="h-text">${h.text}</span></div>`).join('');
        }
        function renderActions() {
            const row = document.getElementById('action-row');
            const cp = parseInt(state?.currentPlayer);
            const pid = parseInt(playerId);
            if (!state || cp !== pid || isObserver) {
                row.innerHTML = '<span style="color:var(--text2);font-size:12px;">⏳ Ожидание хода другого игрока... (вы #'+pid+', ходит #'+cp+')</span>';
                return;
            }
            if (selectedCard) { row.innerHTML = `<button class="btn btn-primary" onclick="requestCard()">❓ Просить "${selectedCard.cardName}"</button>`; }
            else { row.innerHTML = '<span style="color:var(--text2);font-size:12px;">👆 Выберите карточку и игрока</span>'; }
        }
        function showMenu() {
            clearInterval(pollTimer);
            document.getElementById('bottom-panel').classList.add('hidden');
            
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                playerId = parseInt(tg.initDataUnsafe.user.id);
            }
            
            const isAdmin = ADMIN_IDS.includes(parseInt(playerId));
            document.getElementById('app').innerHTML = `
                <div class="menu-container">
                    <div class="menu-decoration"></div>
                    <div class="menu-decoration-2"></div>
                    <div class="logo-container" style="position:relative;z-index:1;">
                        <span class="logo-icon">📖</span>
                        <div class="logo-text-group">
                            <span class="logo-text-main">Библейский квартет</span>
                            <span class="logo-text-sub">BIBLE QUARTET</span>
                        </div>
                    </div>
                    <div style="text-align:center;color:var(--text2);font-size:12px;line-height:1.5;max-width:300px;margin:0 auto;position:relative;z-index:1;">
                        <p>Здесь вы можете играть в Библейский квартет онлайн с другими людьми.</p>
                        <p style="margin-top:4px;opacity:0.7;">Если вы заметили ошибки или хотите что-то добавить, напишите в поддержку.</p>
                    </div>
                    <div class="name-section" style="width:100%;position:relative;z-index:1;">
                        <label style="text-align:center;display:block;font-size:13px;color:var(--text2);font-weight:500;">Ваше имя</label>
                        <input class="input input-name" id="player-name" value="${playerName}" maxlength="20" style="text-align:center;"
                               onblur="saveNameFromMenu()" onkeydown="if(event.key==='Enter') saveNameFromMenu()">
                    </div>
                    <button class="btn btn-primary" style="position:relative;z-index:1;" onclick="saveNameAndCreate()">
                        <span class="btn-icon">🎮</span> Создать игру
                    </button>
                    <button class="btn btn-secondary" style="position:relative;z-index:1;" onclick="saveNameAndJoin()">
                        <span class="btn-icon join-icon">🔗</span> Присоединиться
                    </button>
                    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;margin-top:8px;">
                        <div class="chat-btn-wrapper">
                            <button class="btn btn-secondary" style="max-width:300px;padding:12px 16px;font-size:12px;flex:1;min-height:60px;display:flex;align-items:center;justify-content:center;flex-direction:column;" onclick="openChatModal()">
                                <span style="display:block;">💬 Чат с<br>поддержкой</span>
                            </button>
                            <span class="badge-red" id="chat-badge"></span>
                        </div>
                        <button class="btn btn-secondary" style="max-width:300px;padding:12px 16px;font-size:12px;flex:1;min-height:60px;display:flex;align-items:center;justify-content:center;flex-direction:column;" onclick="openRules()">
                            <span style="display:block;">📜 Правила</span>
                        </button>
                        ${isAdmin ? `
                        <button class="btn btn-secondary" style="max-width:300px;padding:12px 16px;font-size:12px;flex:1;min-height:60px;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(123,75,42,0.15);border-color:var(--accent);" onclick="openAdminPanel()">
                            <span style="display:block;">🛠 Админская<br>часть</span>
                        </button>
                        ` : ''}
                    </div>
                </div>
            `;
            window.saveNameFromMenu = function() {
                const newName = document.getElementById('player-name').value.trim() || 'Игрок';
                playerName = newName;
            };
            // Проверяем, есть ли непрочитанные сообщения от админа
            checkUnreadChats();
        }
        function saveNameAndCreate() { showCreate(); }
        function saveNameAndJoin() { showJoin(); }
        function showCreate() {
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:10px;max-width:400px;margin:0 auto;padding-top:10px;">
                    <div class="header" style="width:100%;">
                        <h2 style="text-align:center;color:var(--accent);font-family:'Inter',sans-serif;font-weight:700;font-size:18px;">Создание игры</h2>
                        <div class="decor-line"></div>
                    </div>
                    <div style="width:100%;display:flex;flex-direction:column;gap:8px;">
                        <button class="btn btn-primary btn-full" onclick="createGame(7)" style="width:100%;border-radius:12px;">
                            <div style="display:flex;flex-direction:column;align-items:center;">
                                <span style="font-size:15px;font-weight:700;">🃏 7 карт</span>
                                <span style="font-size:11px;opacity:0.8;margin-top:2px;">👥 3–21 игрок</span>
                            </div>
                        </button>
                        <button class="btn btn-primary btn-full" onclick="createGame(10)" style="width:100%;border-radius:12px;">
                            <div style="display:flex;flex-direction:column;align-items:center;">
                                <span style="font-size:15px;font-weight:700;">🃏 10 карт</span>
                                <span style="font-size:11px;opacity:0.8;margin-top:2px;">👥 3–14 игроков</span>
                            </div>
                        </button>
                        <button class="btn btn-primary btn-full" onclick="createGame(15)" style="width:100%;border-radius:12px;">
                            <div style="display:flex;flex-direction:column;align-items:center;">
                                <span style="font-size:15px;font-weight:700;">🃏 15 карт</span>
                                <span style="font-size:11px;opacity:0.8;margin-top:2px;">👥 3–9 игроков</span>
                            </div>
                        </button>
                        <button class="btn btn-secondary btn-full" onclick="showMenu()" style="width:100%;border-radius:12px;">← Назад</button>
                    </div>
                </div>
            `;
        }
        function showJoin() {
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:10px;max-width:400px;margin:0 auto;padding-top:10px;">
                    <div class="header" style="width:100%;">
                        <h2 style="text-align:center;color:var(--accent);font-family:'Inter',sans-serif;font-weight:700;font-size:18px;">Подключение</h2>
                        <div class="decor-line"></div>
                    </div>
                    <input class="input input-code" id="join-code" placeholder="ABC123" maxlength="6" style="width:100%;max-width:300px;text-align:center;">
                    <button class="btn btn-primary btn-full" onclick="joinGame()" style="width:100%;max-width:300px;">🔗 Присоединиться</button>
                    <button class="btn btn-secondary btn-full" onclick="showMenu()" style="width:100%;max-width:300px;">← Назад</button>
                </div>
            `;
        }
        async function createGame(n) {
            try {
                const r = await fetch(API+'/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:playerName,cards:n,playerId:parseInt(playerId)})});
                const d = await r.json();
                if(d.ok){roomCode=d.code;playerId=parseInt(d.playerId);showLobby();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        async function joinGame() {
            const code=document.getElementById('join-code').value.trim().toUpperCase();
            if(!code){toast('Введите код','error');return;}
            try {
                const r=await fetch(API+'/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,name:playerName,playerId:parseInt(playerId)})});
                const d=await r.json();
                if(d.ok){roomCode=code;playerId=parseInt(d.playerId);startPolling();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        async function startGame() {
            try {
                const r=await fetch(API+'/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,playerId})});
                const d=await r.json();
                if(d.ok){startPolling();} else toast(d.error,'error');
            } catch(e){toast('Ошибка соединения','error');}
        }
        function copyCode(){if(!roomCode)return;navigator.clipboard.writeText(roomCode).then(()=>toast('📋 Код скопирован!','success')).catch(()=>toast('Не удалось скопировать','error'));}
        function showLobby() {
            clearInterval(pollTimer);
            const isCreator = true; // Тот, кто создал комнату
            document.getElementById('app').innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;gap:8px;max-width:400px;margin:0 auto;">
                    <div class="header" style="width:100%;padding:6px 0 4px;">
                        <div class="logo-container">
                            <span class="logo-icon" style="font-size:28px;">📖</span>
                            <div class="logo-text-group">
                                <span class="logo-text-main" style="font-size:18px;">Библейский квартет</span>
                                <span class="logo-text-sub" style="font-size:10px;">BIBLE QUARTET</span>
                            </div>
                        </div>
                    </div>
                    <div class="name-section" style="width:100%;margin-bottom:4px;">
                        <label style="text-align:center;display:block;font-size:13px;color:var(--text2);font-weight:500;">Ваше имя</label>
                        <input class="input input-name" id="lobby-name" value="${playerName}" maxlength="20" 
                               style="text-align:center;padding:10px 14px;font-size:15px;border-radius:10px;"

                    </div>
                    <div class="code-display" onclick="copyCode()" style="width:100%;padding:12px;margin:4px 0;">
                        <div class="running-border"></div>
                        <div class="code" style="font-size:32px;letter-spacing:8px;font-family:'Playfair Display',serif;color:var(--accent);font-weight:700;">${roomCode}</div>
                        <p class="copy-hint" style="font-size:11px;color:var(--text2);margin-top:6px;">📋 Нажмите, чтобы скопировать</p>
                        <p class="waiting" style="font-size:11px;color:var(--text2);margin-top:4px;">Поделитесь кодом с другими игроками</p>
                    </div>
                    <div class="players-waiting" id="players-waiting" style="width:100%;margin:4px 0;">
                        <div class="player-panel">
                            <div class="player-avatar creator">👤</div>
                            <div class="player-info">
                                <span class="player-name">${playerName}</span>
                                <span class="player-role creator-role">👑 Создатель</span>
                            </div>
                        </div>
                    </div>
                    ${isCreator ? `
                    <button class="btn btn-primary btn-full" onclick="startGame()" style="width:100%;max-width:300px;padding:12px;font-size:15px;border-radius:12px;">🎮 Начать игру</button>
                    ` : `
                    <div style="text-align:center;color:var(--text2);font-size:13px;padding:8px;">⏳ Ожидание, пока создатель начнёт игру...</div>
                    `}
                    <button class="btn btn-secondary btn-full" onclick="clearInterval(pollTimer);showMenu();" style="width:100%;max-width:300px;padding:12px;font-size:15px;border-radius:12px;">← Отмена</button>
                </div>
            `;
            // Обновляем список игроков
            pollTimer = setInterval(async () => {
                try {
                    const r = await fetch(`${API}/state/${roomCode}/${playerId}`);
                    const d = await r.json();
                    if (d.ok) {
                        const container = document.getElementById('players-waiting');
                        if (container) {
                            while (container.children.length > 1) {
                                container.removeChild(container.lastChild);
                            }
                            d.players.forEach(p => {
                                if (p.id === d.ownerId) return;
                                const div = document.createElement('div');
                                div.className = 'player-panel';
                                div.style.marginTop = '4px';
                                div.innerHTML = `
                                    <div class="player-avatar">👤</div>
                                    <div class="player-info">
                                        <span class="player-name">${p.name}</span>
                                        <span class="player-role">Игрок</span>
                                    </div>
                                `;
                                container.appendChild(div);
                            });
                        }
                        if (d.status === 'playing') {
                            fetchState();
                        }
                    }
                } catch (e) {}
            }, 1000);
        }
        function startPolling() {
            if (pollTimer) {
                clearTimeout(pollTimer);
                pollTimer = null;
            }
            fetchState();
            function poll() {
                fetchState();
                pollTimer = setTimeout(poll, 300);
            }
            pollTimer = setTimeout(poll, 300);
        }
        async function fetchState() {
            if(!roomCode||playerId===null)return;
            try {
                const r=await fetch(`${API}/state/${roomCode}/${playerId}`);
                const d=await r.json();
                if(d.ok){
                    d.currentPlayer=parseInt(d.currentPlayer);d.playerId=parseInt(d.playerId);
                    d.bankCount=parseInt(d.bankCount);d.ownerId=parseInt(d.ownerId);
                    if(d.players)d.players.forEach(p=>{p.id=parseInt(p.id);p.handCount=parseInt(p.handCount);});
                    state=d;
                    isObserver = d.is_observer || false;
                    renderGame();
                }
            } catch(e){}
        }
        function renderGame() {
            if(!state||state.status==='lobby'){showLobby();return;}
            document.getElementById('bottom-panel').classList.remove('hidden');
            
            if (isObserver) {
                document.getElementById('app').innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text2);">
                        <span style="font-size:24px;">👁</span>
                        <p style="margin-top:8px;font-size:14px;">Вы наблюдаете за игрой как администратор</p>
                        <button class="btn btn-secondary" onclick="leaveGame()" style="margin-top:12px;">🚪 Выйти из наблюдения</button>
                    </div>
                `;
                return;
            }
            
            const me=state.players.find(p=>parseInt(p.id)===parseInt(playerId));
            if(!me)return;
            const isMyTurn = parseInt(state.currentPlayer) === parseInt(playerId);
            const curObj = state.players.find(p => parseInt(p.id) === parseInt(state.currentPlayer));
            const curName = curObj ? curObj.name : 'Неизвестно';
            let html=`<div class="info-bar"><span class="turn">${isMyTurn?'🎯 Ваш ход':'⏳ Ход: '+curName}</span><span class="score">🏆 ${me.quartets.length} | Запас: ${state.bankCount}</span></div>`;
            html+='<div class="player-list">';
            for(const p of state.players){
                if(parseInt(p.id)===parseInt(playerId))continue;
                const isSelected = selectedPlayerId === parseInt(p.id);
                html+=`<div class="player-card ${parseInt(state.currentPlayer)===parseInt(p.id)?'current':''} ${isSelected?'selected-player':''}" onclick="selectPlayer(${p.id})"><div class="p-name">${p.name}</div><div class="p-info">🃏 ${p.handCount} карт | 🏆 ${p.quartets.length} квартетов</div></div>`;
            }
            html+='</div>';
            const grouped={};if(me.hand)me.hand.forEach(c=>{if(!grouped[c.category])grouped[c.category]=[];grouped[c.category].push(c);});
            const allCats={};state.categories.forEach(q=>{allCats[q.name]=q.cards.map(c=>({name:c.name,category:q.name,owned:me.hand?me.hand.some(h=>h.category===q.name&&h.cardName===c.name):false}));});
            const active=Object.keys(grouped).sort();
            if(!active.length)html+='<p style="text-align:center;padding:40px;color:var(--text2);font-size:14px;">У вас нет карт</p>';
            else {html+=active.map(cat=>{const cards=allCats[cat]||[],cnt=grouped[cat].length,done=cnt===4;const catId=cat.replace(/[^a-zA-Zа-яА-Я0-9]/g,'_');return `<div class="cat-section"><div class="cat-header" onclick="toggleCat('${catId}')"><span class="title">${cat}</span><span class="badge ${done?'badge-full':'badge-partial'}">${cnt}/4${done?' ✅':''}</span><span class="arrow" id="arrow-${catId}">▼</span></div><div class="cards-row" id="row-${catId}">${cards.map(c=>{const o=c.owned;const s=selectedCard&&selectedCard.category===cat&&selectedCard.cardName===c.name;return o?`<div class="card-chip owned"><div class="chip-name">✅ ${c.name}</div></div>`:`<div class="card-chip missing ${s?'selected':''}" onclick="selectCard('${cat.replace(/'/g,"\\'")}','${c.name.replace(/'/g,"\\'")}')"><div class="chip-name">🃏 ${c.name}</div></div>`;}).join('')}</div></div>`;}).join('');}
            document.getElementById('app').innerHTML=html;renderHistory(state.history);renderActions();checkWin();
            
            const bottom = document.getElementById('bottom-panel');
            const exitBtn = document.createElement('div');
            exitBtn.style.cssText = 'display:flex;gap:8px;padding:4px 10px;justify-content:center;';
            exitBtn.innerHTML = `
                <button class="btn btn-secondary" style="padding:6px 14px;font-size:12px;" onclick="leaveGame()">🚪 Покинуть игру</button>
                ${parseInt(state.ownerId) === parseInt(playerId) ? `
                <button class="btn btn-secondary" style="padding:6px 14px;font-size:12px;background:var(--red);color:#fff;border-color:var(--red);" onclick="endGame()">🚫 Завершить игру</button>
                ` : ''}
            `;
            bottom.appendChild(exitBtn);
        }
        function toggleCat(id){document.getElementById('row-'+id).classList.toggle('collapsed');document.getElementById('arrow-'+id).classList.toggle('open');}
        function selectPlayer(pid){
            selectedPlayerId = parseInt(pid);
            const p = state.players.find(p => parseInt(p.id) === parseInt(pid));
            if (p) toast(`Выбран: ${p.name}`,'');
            renderGame();
        }
        function selectCard(cat,name){if(parseInt(state.currentPlayer)!==parseInt(playerId))return;selectedCard=(selectedCard&&selectedCard.category===cat&&selectedCard.cardName===name)?null:{category:cat,cardName:name};renderGame();}
        async function requestCard() {
            if(!selectedCard){toast('⚠️ Выберите карточку!','error');return;}
            const toPlayer=selectedPlayerId!==null?selectedPlayerId:state.players.find(p=>parseInt(p.id)!==parseInt(playerId))?.id;
            if(toPlayer===undefined){toast('⚠️ Выберите игрока!','error');return;}
            const fromName = state.players.find(p => parseInt(p.id) === parseInt(playerId))?.name || 'Игрок';
            const toName = state.players.find(p => parseInt(p.id) === parseInt(toPlayer))?.name || 'Игрок';
            try {
                const r=await fetch(API+'/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,fromPlayer:parseInt(playerId),toPlayer:parseInt(toPlayer),category:selectedCard.category,cardName:selectedCard.cardName})});
                const d=await r.json();
                if(d.ok){
                    if(d.found){
                        toast(`✅ ${fromName} запросил(а) "${selectedCard.cardName}" у ${toName}. Карта есть! Переходит к ${fromName}`, 'success');
                    }else{
                        const nextName = state.players.find(p => parseInt(p.id) === parseInt(d.nextPlayer))?.name || 'неизвестно';
                        toast(`❌ ${fromName} запросил(а) "${selectedCard.cardName}" у ${toName}. Карты нет. Ходит ${nextName}`, 'error');
                    }
                    selectedCard=null;selectedPlayerId=null;
                    fetchState();
                } else toast(d.error,'error');
            } catch(e){toast('Ошибка','error');}
        }
        function checkWin() {
            if(!state)return;
            const allCollected=state.players.reduce((s,p)=>s+p.quartets.length,0);
            if(allCollected>=state.categories.length||(state.bankCount===0&&state.players.every(p=>p.handCount===0))){
                clearInterval(pollTimer);
                document.getElementById('bottom-panel').classList.add('hidden');
                const sorted=[...state.players].sort((a,b)=>b.quartets.length-a.quartets.length);
                document.getElementById('app').innerHTML=`<div class="header"><h1 style="font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:var(--accent);">🏆 Игра окончена!</h1><div class="decor-line"></div></div>`+sorted.map((p,i)=>`<div class="score-item ${i===0&&sorted[0].quartets.length>0?'winner':''}"><span>${i===0?'👑 ':''}${p.name}</span><span style="color:var(--accent);font-weight:700;">${p.quartets.length} квартетов</span></div>`).join('')+'<button class="btn btn-primary btn-full" onclick="showMenu()">В меню</button>';
            }
        }
        async function leaveGame() {
            try {
                const r=await fetch(API+'/leave',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,playerId:parseInt(playerId)})});
                const d=await r.json();
                if(d.ok){
                    toast('🚪 Вы покинули игру', '');
                    clearInterval(pollTimer);
                    document.getElementById('bottom-panel').classList.add('hidden');
                    showMenu();
                } else toast(d.error,'error');
            } catch(e){toast('Ошибка','error');}
        }
        async function endGame() {
            if (!confirm('Вы уверены, что хотите завершить игру?')) return;
            try {
                const r=await fetch(API+'/end_game',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,playerId:parseInt(playerId)})});
                const d=await r.json();
                if(d.ok){
                    toast('🚫 Игра завершена', '');
                    clearInterval(pollTimer);
                    await fetchState();
                } else toast(d.error,'error');
            } catch(e){toast('Ошибка','error');}
        }
        showMenu();

        // ===== ЧАТ С ПОДДЕРЖКОЙ =====
        function checkUnreadChats() {
            // Проверяем, есть ли непрочитанные сообщения от админа
            const badge = document.getElementById('chat-badge');
            if (!badge) return;
            const unread = Object.values(adminChats).reduce((sum, chat) => sum + (chat.unread || 0), 0);
            if (unread > 0) {
                badge.classList.add('active');
            } else {
                badge.classList.remove('active');
            }
        }

        function openChatModal() {
            if (chatModalOpen) return;
            chatModalOpen = true;
            const modal = document.createElement('div');
            modal.id = 'chat-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="chat-header">
                        <h3>💬 Чат с поддержкой</h3>
                        <button class="close-btn" onclick="closeChatModal()">✕</button>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-message received">
                            Здравствуйте! Чем я могу вам помочь?
                            <div class="msg-time">${new Date().toLocaleTimeString()}</div>
                        </div>
                        <!-- Сообщения будут добавляться динамически -->
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendChatMessage()">
                        <button onclick="sendChatMessage()">➤</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            // Помечаем все сообщения как прочитанные при открытии
            for (let key in adminChats) {
                adminChats[key].unread = 0;
            }
            checkUnreadChats();
            document.getElementById('chat-input').focus();
        }

        function closeChatModal() {
            chatModalOpen = false;
            const modal = document.getElementById('chat-modal');
            if (modal) modal.remove();
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            
            // Добавляем сообщение в чат
            const messages = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message sent';
            msgDiv.innerHTML = `
                ${text}
                <div class="msg-time">${new Date().toLocaleTimeString()}</div>
            `;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
            
            // Отправляем на сервер
            try {
                await fetch(API + '/chat/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        code: roomCode || 'menu',
                        playerId: playerId,
                        name: playerName,
                        message: text
                    })
                });
            } catch(e) {
                // Пока просто игнорируем ошибку
            }
        }

        // ===== АДМИНСКАЯ ПАНЕЛЬ =====
        function openAdminPanel() {
            if (adminOpen) return;
            if (!ADMIN_IDS.includes(parseInt(playerId))) {
                toast('Доступ только для администраторов', 'error');
                return;
            }
            adminOpen = true;
            
            // Сначала открываем панель с заглушкой, потом загружаем данные
            const modal = document.createElement('div');
            modal.id = 'admin-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>📊 Панель администратора</h3>
                    <div class="tabs">
                        <button class="active" onclick="switchAdminTab('games')">🎮 Игры</button>
                        <button onclick="switchAdminTab('chats')">💬 Чаты с игроками</button>
                    </div>
                    <div id="tab-games" class="tab-content active">
                        <div class="section-title">Активные игры</div>
                        <div id="admin-games-list">Загрузка...</div>
                        <div class="section-title">Завершённые игры</div>
                        <div id="admin-finished-games">Загрузка...</div>
                    </div>
                    <div id="tab-chats" class="tab-content">
                        <div class="section-title">Чаты с игроками</div>
                        <div id="admin-chats-list">Загрузка...</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="closeAdminPanel()">← Закрыть</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // Загружаем данные
            loadAdminData();

        function closeAdminPanel() {
            adminOpen = false;
            const modal = document.getElementById('admin-modal');
            if (modal) modal.remove();
        }

        function switchAdminTab(tab) {
            document.querySelectorAll('#admin-modal .tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#admin-modal .tab-content').forEach(c => c.classList.remove('active'));
            const tabBtn = document.querySelector(`#admin-modal .tabs button[onclick*="${tab}"]`);
            if (tabBtn) tabBtn.classList.add('active');
            const tabContent = document.getElementById(`tab-${tab}`);
            if (tabContent) tabContent.classList.add('active');
        }

        async function loadAdminData() {
            try {
                // Загружаем игры
                const gamesRes = await fetch(API + '/admin/games/' + playerId);
                const gamesData = await gamesRes.json();
                
                // Загружаем чаты
                const chatsRes = await fetch(API + '/chat/list/' + playerId);
                const chatsData = await chatsRes.json();
                
                // Обрабатываем игры
                if (gamesData.ok) {
                    const gamesList = document.getElementById('admin-games-list');
                    const finishedList = document.getElementById('admin-finished-games');
                    
                    const activeGames = gamesData.games.filter(g => g.status === 'playing');
                    const finishedGames = gamesData.games.filter(g => g.status !== 'playing');
                    
                    if (gamesList) {
                        if (activeGames.length === 0) {
                            gamesList.innerHTML = '<p style="font-size:13px;color:var(--text2);">Активных игр нет</p>';
                        } else {
                            gamesList.innerHTML = activeGames.map(game => `
                                <div class="game-item">
                                    <div>
                                        <span class="status-indicator active"></span>
                                        <strong>${game.code}</strong>
                                        <span style="font-size:11px;color:var(--text2);margin-left:6px;">🟢</span>
                                        <span style="font-size:11px;color:var(--text2);margin-left:6px;">👤 ${game.players.map(p => p.name).join(', ')}</span>
                                    </div>
                                    <button class="observe-btn" onclick="observeGame('${game.code}')">👁 Наблюдать</button>
                                </div>
                            `).join('');
                        }
                    }
                    
                    if (finishedList) {
                        if (finishedGames.length === 0) {
                            finishedList.innerHTML = '<p style="font-size:13px;color:var(--text2);">Завершённых игр нет</p>';
                        } else {
                            finishedList.innerHTML = finishedGames.map(game => `
                                <div class="game-item">
                                    <div>
                                        <span class="status-indicator finished"></span>
                                        <strong>${game.code}</strong>
                                        <span style="font-size:11px;color:var(--text2);margin-left:6px;">🔴</span>
                                        <span style="font-size:11px;color:var(--text2);margin-left:6px;">👤 ${game.players.map(p => p.name).join(', ')}</span>
                                    </div>
                                    <button class="observe-btn" onclick="openFinishedGameStats('${game.code}')">📊 Статистика</button>
                                </div>
                            `).join('');
                        }
                    }
                }
                
                // Обрабатываем чаты
                if (chatsData.ok) {
                    const chatsList = document.getElementById('admin-chats-list');
                    if (chatsList) {
                        if (chatsData.chats.length === 0) {
                            chatsList.innerHTML = '<p style="font-size:13px;color:var(--text2);">Чатов пока нет</p>';
                        } else {
                            // Сохраняем в локальное хранилище
                            adminChats = {};
                            chatsData.chats.forEach(chat => {
                                adminChats[chat.roomCode] = {
                                    name: chat.name,
                                    lastMsg: chat.lastMsg,
                                    time: chat.time,
                                    unread: chat.unread || 0
                                };
                            });
                            chatsList.innerHTML = chatsData.chats.map(chat => `
                                <div class="chat-item">
                                    <div>
                                        <div class="chat-name">${chat.name}</div>
                                        <div class="chat-last">${chat.lastMsg || 'Нет сообщений'}</div>
                                        ${chat.unread > 0 ? `<span style="color:#ff3b30;font-weight:600;font-size:10px;">${chat.unread} нов.</span>` : ''}
                                    </div>
                                    <button class="chat-btn" onclick="openAdminChat('${chat.roomCode}', '${chat.name}')">Открыть</button>
                                </div>
                            `).join('');
                        }
                    }
                }
            } catch (e) {
                toast('Ошибка загрузки данных', 'error');
            }
        }

        // ===== НАБЛЮДЕНИЕ =====
        function observeGame(code) {
            closeAdminPanel();
            if (!ADMIN_IDS.includes(parseInt(playerId))) {
                toast('Доступ только для администраторов', 'error');
                return;
            }
            fetch(API + '/observe/' + code + '/' + playerId, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            })
            .then(res => res.json())
            .then(d => {
                if (d.ok) {
                    roomCode = d.roomCode;
                    playerId = d.playerId;
                    isObserver = true;
                    startPolling();
                    toast('👁 Вы вошли в игру как наблюдатель', 'success');
                } else {
                    toast('Ошибка: ' + d.error, 'error');
                }
            })
            .catch(() => toast('Ошибка подключения', 'error'));
        }

        // ===== СТАТИСТИКА ЗАВЕРШЁННОЙ ИГРЫ =====

            // Для демо показываем модальное окно со статистикой

            modal.id = 'admin-modal';
            const players = [
                { name: 'Игрок1', quartets: 3, handCount: 5 },

                { name: 'Игрок3', quartets: 1, handCount: 9 }
            ];
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>📊 Статистика игры #${code}</h3>
                    <div class="section-title">Игроки</div>

                        <div class="player-stat" onclick="openPlayerChat('${code}', '${p.name}')">
                            <span class="stat-name">${p.name}</span>
                            <span class="stat-info">🏆 ${p.quartets} квартетов | 🃏 ${p.handCount} карт</span>
                        </div>
                    `).join('')}
                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="closeAdminPanel()">← Закрыть</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function openPlayerChat(roomCode, playerName) {
            // Открыть чат с игроком
            closeAdminPanel();
            openAdminChat(roomCode, playerName);
        }

        // ===== ЧАТ АДМИНА С ИГРОКОМ =====
        function openAdminChat(roomCode, playerName) {
            if (adminChatModalOpen) return;
            adminChatModalOpen = true;
            const modal = document.createElement('div');
            modal.id = 'admin-chat-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="chat-header">
                        <h3>💬 Чат с ${playerName}</h3>
                        <button class="close-btn" onclick="closeAdminChat()">✕</button>
                    </div>
                    <div class="chat-messages" id="admin-chat-messages">
                        <div class="chat-message sent">
                            Здравствуйте! Есть вопрос по игре.
                            <div class="msg-time">${new Date().toLocaleTimeString()}</div>
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="admin-chat-input" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendAdminChatMessage('${roomCode}')">
                        <button onclick="sendAdminChatMessage('${roomCode}')">➤</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('admin-chat-input').focus();
            
            // Загружаем историю сообщений с сервера
            loadAdminChatHistory(roomCode);
        }

        function closeAdminChat() {
            adminChatModalOpen = false;
            const modal = document.getElementById('admin-chat-modal');
            if (modal) modal.remove();
        }

        function sendAdminChatMessage(roomCode) {
            const input = document.getElementById('admin-chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            
            const messages = document.getElementById('admin-chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message sent';
            msgDiv.innerHTML = `
                ${text}
                <div class="msg-time">${new Date().toLocaleTimeString()}</div>
            `;
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
            
            // Отправляем на сервер
            fetch(API + '/chat/reply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    adminId: playerId,
                    roomCode: roomCode,
                    message: text
                })
            })
            .then(res => res.json())
            .then(d => {
                if (!d.ok) {
                    toast('Ошибка отправки: ' + d.error, 'error');
                }
            })
            .catch(() => toast('Ошибка соединения', 'error'));
        }

        async function loadAdminChatHistory(roomCode) {
            try {
                const res = await fetch(API + '/chat/messages/' + playerId + '/' + roomCode);
                const d = await res.json();
                if (d.ok && d.messages) {
                    const messages = document.getElementById('admin-chat-messages');
                    // Очищаем, кроме приветственного
                    messages.innerHTML = '';
                    d.messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'chat-message ' + (msg.from_player === playerId ? 'sent' : 'received');
                        div.innerHTML = `
                            ${msg.message}
                            <div class="msg-time">${msg.time}</div>
                        `;
                        messages.appendChild(div);
                    });
                    messages.scrollTop = messages.scrollHeight;
                }
            } catch (e) {
                // Игнорируем ошибки
            }
        }
    </script>
</body>
</html>
