<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библейский квартет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0d0d1a; --card: #1a1a35; --accent: #e2a03f;
            --accent2: #7c3aed; --text: #f1f5f9; --text2: #94a3b8;
            --green: #10b981; --red: #ef4444; --border: #2d2d4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
        .container { max-width: 700px; margin: 0 auto; }
        .header { text-align: center; padding: 16px 0; }
        .btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; margin: 6px 0; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-danger { background: var(--red); color: #fff; }

        /* Заголовок категории (сворачиваемый) */
        .cat-header {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px; margin: 8px 0 0;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none; transition: all 0.2s;
        }
        .cat-header:hover { border-color: var(--accent); }
        .cat-header .title { font-weight: bold; color: var(--accent); font-size: 14px; text-transform: uppercase; }
        .cat-header .info { display: flex; gap: 10px; align-items: center; }
        .cat-header .count { font-size: 13px; padding: 4px 10px; border-radius: 8px; }
        .count-full { background: var(--green); color: #fff; }
        .count-partial { background: rgba(226,160,63,0.2); color: var(--accent); }
        .cat-header .arrow { font-size: 18px; transition: transform 0.3s; }
        .cat-header .arrow.open { transform: rotate(180deg); }

        /* Сетка карт */
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 6px 0 0; }
        .cards-grid.collapsed { display: none; }

        /* Карточка */
        .card-cell {
            background: var(--card); border: 3px solid var(--border);
            border-radius: 10px; overflow: hidden; cursor: pointer;
            transition: all 0.2s; aspect-ratio: 3/4; position: relative;
        }
        .card-cell.owned { border-color: var(--green); cursor: default; }
        .card-cell.missing { opacity: 0.5; filter: grayscale(0.6); }
        .card-cell.missing:hover { opacity: 0.8; filter: grayscale(0.2); border-color: var(--accent2); }
        
        /* ВЫБРАНА */
        .card-cell.selected {
            border-color: var(--accent2) !important;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.6);
            opacity: 1 !important; filter: none !important;
            transform: scale(1.03);
        }
        .card-cell.selected::after {
            content: '✅';
            position: absolute; top: 6px; right: 6px;
            font-size: 18px; z-index: 5;
            background: var(--accent2); border-radius: 50%;
            width: 28px; height: 28px; display: flex;
            align-items: center; justify-content: center;
        }

        .card-cell img { width: 100%; height: 100%; object-fit: cover; }
        .card-cell .label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7); padding: 3px 6px;
            font-size: 10px; text-align: center; color: #fff;
        }

        .game-log { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin: 12px 0; max-height: 80px; overflow-y: auto; font-size: 11px; color: var(--text2); }
        .hidden { display: none !important; }
        .score-item { background: var(--card); border-radius: 12px; padding: 12px; margin: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="container">
        <div id="main-menu">
            <div class="header"><h1>📖 Библейский квартет</h1><p style="color:var(--text2)">37 квартетов · 148 карт</p></div>
            <button class="btn btn-primary" onclick="showCardCountChoice()">🎮 Играть с ботом</button>
        </div>
        <div id="card-count-screen" class="hidden">
            <div class="header"><h2>🃏 Сколько карт раздать?</h2></div>
            <button class="btn btn-primary" onclick="startGame(7)">7 карт</button>
            <button class="btn btn-primary" onclick="startGame(10)">10 карт</button>
            <button class="btn btn-primary" onclick="startGame(15)">15 карт</button>
            <button class="btn btn-secondary" onclick="showMainMenu()">← Назад</button>
        </div>
        <div id="game-screen" class="hidden">
            <div class="header"><h2 id="game-status" style="color:var(--accent)"></h2><p style="color:var(--text2)" id="turn-info"></p></div>
            <div class="game-log" id="game-log"></div>
            <div id="play-area"></div>
            <button class="btn btn-primary hidden" id="request-btn" onclick="requestSelected()">❓ Запросить выбранную карту</button>
            <button class="btn btn-danger hidden" id="end-btn" onclick="endTurn()">✅ Закончить ход</button>
        </div>
        <div id="win-screen" class="hidden">
            <div class="header"><h1>🏆 Игра окончена!</h1><div class="scoreboard" id="scoreboard"></div><button class="btn btn-primary" onclick="showMainMenu()">В меню</button></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) { tg.expand(); tg.ready(); }
        let gameState = null;
        let playerName = 'Игрок';
        let selectedCard = null; // {category, cardName}
        if (tg?.initDataUnsafe?.user) playerName = tg.initDataUnsafe.user.first_name || 'Игрок';

        async function loadData() { const r = await fetch('data.json'); return await r.json(); }
        function showMainMenu() { document.querySelectorAll('#main-menu, #card-count-screen, #game-screen, #win-screen').forEach(e => e.classList.add('hidden')); document.getElementById('main-menu').classList.remove('hidden'); }
        function showCardCountChoice() { document.getElementById('main-menu').classList.add('hidden'); document.getElementById('card-count-screen').classList.remove('hidden'); }

        async function startGame(n) {
            const data = await loadData();
            if (!data.length) return alert('Ошибка');
            let deck = [];
            data.forEach(q => q.cards.forEach(c => deck.push({ category: q.name, categoryId: q.id, cardName: c.name, image: c.image })));
            deck = shuffle(deck);
            gameState = { players: [{ id: 0, name: playerName, hand: deck.splice(0, n), quartets: [] }, { id: 1, name: 'Бот', hand: deck.splice(0, n), quartets: [] }], bank: deck, currentPlayer: 0, log: [], data: data };
            document.getElementById('card-count-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            addLog('🎮 Игра началась! Выберите тусклую карту (❓) и нажмите "Запросить".');
            updateUI();
        }

        function updateUI() {
            const me = gameState.players[0], cur = gameState.players[gameState.currentPlayer];
            document.getElementById('game-status').textContent = gameState.currentPlayer === 0 ? '🎯 Ваш ход' : '⏳ Бот думает...';
            document.getElementById('turn-info').textContent = `Ходит: ${cur.name} | 🏆 Вы: ${me.quartets.length} | Бот: ${gameState.players[1].quartets.length}`;
            if (gameState.currentPlayer === 0) {
                document.getElementById('request-btn').classList.remove('hidden');
                document.getElementById('end-btn').classList.remove('hidden');
            } else {
                document.getElementById('request-btn').classList.add('hidden');
                document.getElementById('end-btn').classList.add('hidden');
                setTimeout(botTurn, 1200);
            }
            renderPlayArea();
            checkWin();
        }

        function renderPlayArea() {
            const me = gameState.players[0], container = document.getElementById('play-area');
            const grouped = {};
            me.hand.forEach(c => { if (!grouped[c.category]) grouped[c.category] = []; grouped[c.category].push(c); });
            const allGrouped = {};
            gameState.data.forEach(q => { allGrouped[q.name] = q.cards.map(c => ({ ...c, category: q.name, owned: me.hand.some(h => h.category === q.name && h.cardName === c.name) })); });
            const active = Object.keys(grouped).sort();
            if (!active.length) { container.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text2)">У вас нет карт</p>'; return; }

            container.innerHTML = active.map(cat => {
                const cards = allGrouped[cat] || [], cnt = grouped[cat].length, done = cnt === 4;
                const catId = cat.replace(/[^a-zA-Zа-яА-Я0-9]/g, '_');
                return `
                    <div class="cat-header" onclick="toggleCategory('${catId}')">
                        <span class="title">${cat}</span>
                        <div class="info">
                            <span class="count ${done ? 'count-full' : 'count-partial'}">${cnt}/4${done ? ' ✅' : ''}</span>
                            <span class="arrow" id="arrow-${catId}">▼</span>
                        </div>
                    </div>
                    <div class="cards-grid" id="grid-${catId}">
                        ${cards.map(c => {
                            const isOwned = c.owned;
                            const isSel = selectedCard && selectedCard.category === cat && selectedCard.cardName === c.name;
                            if (isOwned) {
                                return `<div class="card-cell owned"><img src="${c.image}" alt=""><div class="label">✅ ${c.name}</div></div>`;
                            } else {
                                return `<div class="card-cell missing ${isSel ? 'selected' : ''}" onclick="selectCard('${cat.replace(/'/g, "\\'")}', '${c.name.replace(/'/g, "\\'")}')"><img src="${c.image}" alt=""><div class="label">❓ ${c.name}</div></div>`;
                            }
                        }).join('')}
                    </div>
                `;
            }).join('');
        }

        // СВОРАЧИВАНИЕ
        function toggleCategory(catId) {
            const grid = document.getElementById('grid-' + catId);
            const arrow = document.getElementById('arrow-' + catId);
            if (grid) grid.classList.toggle('collapsed');
            if (arrow) arrow.classList.toggle('open');
        }

        function selectCard(cat, name) {
            if (gameState.currentPlayer !== 0) return;
            if (selectedCard && selectedCard.category === cat && selectedCard.cardName === name) {
                selectedCard = null; // снять выбор
            } else {
                selectedCard = { category: cat, cardName: name };
            }
            renderPlayArea();
        }

        function requestSelected() {
            if (!selectedCard) return alert('Сначала выберите тусклую карту (❓)!');
            const me = gameState.players[0], bot = gameState.players[1];
            const idx = bot.hand.findIndex(c => c.category === selectedCard.category && c.cardName === selectedCard.cardName);
            if (idx !== -1) {
                me.hand.push(bot.hand.splice(idx, 1)[0]);
                addLog(`✅ Вы забрали "${selectedCard.cardName}" у бота!`);
                checkQuartets();
            } else {
                if (gameState.bank.length) { me.hand.push(gameState.bank.pop()); addLog(`❌ У бота нет "${selectedCard.cardName}". Берёте из банка.`); }
                else addLog(`❌ У бота нет "${selectedCard.cardName}". Банк пуст.`);
                gameState.currentPlayer = 1;
            }
            selectedCard = null;
            updateUI();
        }

        function endTurn() { selectedCard = null; gameState.currentPlayer = 1; updateUI(); }

        function botTurn() {
            if (gameState.currentPlayer !== 1) return;
            const bot = gameState.players[1];
            if (!bot.hand.length) { gameState.currentPlayer = 0; updateUI(); return; }
            const card = bot.hand[Math.floor(Math.random() * bot.hand.length)];
            const idx = gameState.players[0].hand.findIndex(c => c.category === card.category && c.cardName === card.cardName);
            if (idx !== -1) { bot.hand.push(gameState.players[0].hand.splice(idx, 1)[0]); addLog(`😈 Бот забрал "${card.cardName}"!`); checkQuartets(); }
            else { if (gameState.bank.length) { bot.hand.push(gameState.bank.pop()); addLog(`🤖 Бот искал "${card.cardName}". Взял из банка.`); } else addLog(`🤖 Бот искал "${card.cardName}". Банк пуст.`); }
            gameState.currentPlayer = 0; updateUI();
        }

        function checkQuartets() { [0, 1].forEach(pid => { const p = gameState.players[pid], g = {}; p.hand.forEach(c => { if (!g[c.category]) g[c.category] = []; g[c.category].push(c); }); Object.entries(g).forEach(([cat, cards]) => { if (cards.length === 4) { p.quartets.push(cat); p.hand = p.hand.filter(c => c.category !== cat); addLog(`🏆 ${p.name} собрал квартет "${cat}"!`); } }); }); }
        function checkWin() { const t = gameState.data.length, p1 = gameState.players[0].quartets.length, p2 = gameState.players[1].quartets.length; if (p1 + p2 >= t || (!gameState.bank.length && !gameState.players[0].hand.length && !gameState.players[1].hand.length)) endGame(); }
        function endGame() { document.getElementById('game-screen').classList.add('hidden'); document.getElementById('win-screen').classList.remove('hidden'); document.getElementById('scoreboard').innerHTML = gameState.players.sort((a, b) => b.quartets.length - a.quartets.length).map(p => `<div class="score-item"><span>${p.quartets.length >= Math.max(...gameState.players.map(x => x.quartets.length)) ? '👑 ' : ''}${p.name}</span><span style="color:var(--accent)">${p.quartets.length} квартетов</span></div>`).join(''); }
        function addLog(m) { gameState.log.push(m); const el = document.getElementById('game-log'); el.innerHTML = gameState.log.slice(-6).map(x => `<p>${x}</p>`).join(''); el.scrollTop = el.scrollHeight; }
        function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

        showMainMenu();
    </script>
</body>
</html>
